<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Nota Fiscal | Berlim Gráfica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          
                        brandHover: '#d9641c',     
                        darkBg: '#000000',         
                        darkCard: '#0A0A0A',       
                        darkElevated: '#111111',   
                        darkHover: '#1A1A1A',      
                        darkBorder: '#333333',     
                        darkInput: '#000000'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #EDEFF0;
            color: #454545;
            font-family: 'Montserrat', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div id="app-container" class="w-full max-w-lg bg-white border border-gray-200 rounded-xl shadow-2xl p-8 fade-in">
        <div id="selecao-container" class="text-center space-y-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Solicitação de Nota Fiscal</h1>
            <p class="text-sm text-gray-500 mb-8">Por favor, indique como deseja emitir a sua nota fiscal.</p>
            
            <button type="button" id="btnPF" class="w-full bg-white hover:bg-gray-50 border border-gray-200 hover:border-brand text-gray-800 font-semibold py-4 px-4 rounded-xl shadow transition group flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-brand transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="text-lg">Sou Pessoa Física</span>
                </div>
                <svg class="w-5 h-5 text-gray-600 group-hover:text-brand transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button type="button" id="btnPJ" class="w-full bg-white hover:bg-gray-50 border border-gray-200 hover:border-brand text-gray-800 font-semibold py-4 px-4 rounded-xl shadow transition group flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-brand transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1v1H9V7zm5 0h1v1h-1V7zm-5 4h1v1H9v-1zm5 0h1v1h-1v-1zm-5 4h1v1H9v-1zm5 0h1v1h-1v-1z"></path></svg>
                    <span class="text-lg">Sou Pessoa Jurídica</span>
                </div>
                <svg class="w-5 h-5 text-gray-600 group-hover:text-brand transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <form id="notaForm" class="space-y-5 hidden">
            <div class="flex items-center justify-between mb-4 border-b border-gray-200 pb-4">
                <h2 class="text-lg font-bold text-gray-800">Dados para Emissão</h2>
                <button type="button" id="btnVoltar" class="text-sm font-semibold text-gray-500 hover:text-gray-800 transition flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Voltar
                </button>
            </div>

            <div>
                <label id="lblCliente" class="block text-sm font-semibold text-gray-700 mb-1">Seu Nome / Nome Fantasia *</label>
                <input type="text" id="cliente" required class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-800 focus:outline-none focus:border-brand transition" placeholder="Como devemos identificar você?">
            </div>
            
            <div>
                <label id="lblRazaoSocial" class="block text-sm font-semibold text-gray-700 mb-1">Razão Social *</label>
                <input type="text" id="razao_social" required class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-800 focus:outline-none focus:border-brand transition" placeholder="Razão Social da Empresa">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label id="lblCnpj" class="block text-sm font-semibold text-gray-700 mb-1">CNPJ *</label>
                    <input type="text" id="cnpj" required class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-800 focus:outline-none focus:border-brand transition" placeholder="00.000.000/0000-00">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Contato (WhatsApp) *</label>
                    <input type="text" id="contato" required class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-800 focus:outline-none focus:border-brand transition" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Endereço Completo *</label>
                <textarea id="endereco" required rows="3" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-800 focus:outline-none focus:border-brand transition" placeholder="Rua, Número, Bairro, Cidade, Estado, CEP"></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-brand hover:bg-brandHover text-gray-800 font-bold py-3 px-4 rounded-lg shadow-lg transition mt-4">
                Enviar Dados
            </button>
            <p id="feedback" class="text-center text-sm font-semibold mt-4 hidden"></p>
        </form>

        <div id="successMessage" class="hidden text-center py-8">
            <svg class="w-16 h-16 text-brand mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Dados Enviados!</h2>
            <p class="text-sm text-gray-500">Recebemos as suas informações. A Berlim Gráfica fará a emissão da Nota Fiscal em breve.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cnpjInput = document.getElementById('cnpj');
            const contatoInput = document.getElementById('contato');
            const form = document.getElementById('notaForm');
            const btnSubmit = document.getElementById('btnSubmit');
            const feedback = document.getElementById('feedback');
            const successMessage = document.getElementById('successMessage');

            let tipoPessoa = 'J'; // J = Jurídica, F = Física

            const selecaoContainer = document.getElementById('selecao-container');
            const btnPF = document.getElementById('btnPF');
            const btnPJ = document.getElementById('btnPJ');
            const btnVoltar = document.getElementById('btnVoltar');

            const lblCliente = document.getElementById('lblCliente');
            const lblRazaoSocial = document.getElementById('lblRazaoSocial');
            const lblCnpj = document.getElementById('lblCnpj');
            const razaoSocialInput = document.getElementById('razao_social');
            
            function abrirFormulario(tipo) {
                tipoPessoa = tipo;
                selecaoContainer.classList.add('hidden');
                form.classList.remove('hidden');
                
                // Limpar campos de máscara pra evitar bug
                cnpjInput.value = '';
                
                if (tipo === 'F') {
                    lblCliente.innerText = 'Como quer ser chamado (Apelido)? *';
                    lblRazaoSocial.innerText = 'Nome Completo *';
                    razaoSocialInput.placeholder = 'Seu Nome Completo';
                    lblCnpj.innerText = 'CPF *';
                    cnpjInput.placeholder = '000.000.000-00';
                } else {
                    lblCliente.innerText = 'Seu Nome / Nome Fantasia *';
                    lblRazaoSocial.innerText = 'Razão Social *';
                    razaoSocialInput.placeholder = 'Razão Social da Empresa';
                    lblCnpj.innerText = 'CNPJ *';
                    cnpjInput.placeholder = '00.000.000/0000-00';
                }
            }

            btnPF.addEventListener('click', () => abrirFormulario('F'));
            btnPJ.addEventListener('click', () => abrirFormulario('J'));
            
            btnVoltar.addEventListener('click', () => {
                form.classList.add('hidden');
                selecaoContainer.classList.remove('hidden');
            });

            // Máscara Dinâmica (CPF ou CNPJ)
            cnpjInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                if (tipoPessoa === 'J') {
                    // Máscara de CNPJ
                    let x = v.match(/(\d{0,2})(\d{0,3})(\d{0,3})(\d{0,4})(\d{0,2})/);
                    if (!x) return;
                    e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' : '') + x[3] + (x[4] ? '/' : '') + x[4] + (x[5] ? '-' : '') + x[5];
                } else {
                    // Máscara de CPF
                    let x = v.match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
                    if (!x) return;
                    e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' : '') + x[3] + (x[4] ? '-' : '') + x[4];
                }
            });

            // Máscara de Telefone
            contatoInput.addEventListener('input', function(e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                if (!x) return;
                if (!x[2]) {
                    e.target.value = x[1] ? '(' + x[1] : '';
                } else if (x[1].length === 2) {
                    e.target.value = '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
                }
            });

            let supabase;
            try {
                const supabaseUrl = 'https://xbanoipgoleuahwbqksy.supabase.co';
                const supabaseKey = 'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh';
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            } catch(err) {
                console.error("Erro ao instanciar Supabase:", err);
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                btnSubmit.disabled = true;
                btnSubmit.innerText = 'Enviando...';
                feedback.classList.add('hidden');

                const payload = {
                    cliente: document.getElementById('cliente').value,
                    razao_social: document.getElementById('razao_social').value,
                    cnpj: document.getElementById('cnpj').value,
                    contato: document.getElementById('contato').value,
                    endereco: document.getElementById('endereco').value
                };

                try {
                    if (!supabase) throw new Error("A conexão com o banco não pôde ser iniciada.");
                    
                    const { data, error } = await supabase.from('notas_fiscais').insert([payload]);

                    if (error) throw error;
                    
                    form.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                } catch (err) {
                    feedback.innerText = 'Falha ao enviar os dados. Ocorreu um erro no servidor.';
                    feedback.classList.remove('hidden', 'text-emerald-500');
                    feedback.classList.add('text-red-500');
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Enviar Dados';
                    console.error("Erro ao enviar:", err);
                }
            });
        });
    </script>
</body>
</html>
