<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 
                darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' 
            }}}
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; }
        .glass { backdrop-filter: blur(8px); }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        // ==== FUNÇÕES DE MÁSCARA (FORMATAÇÃO) ====
        const formatarMoeda = (valor) => {
            if (!valor) return '';
            const numeroLimpo = valor.toString().replace(/\D/g, ''); 
            if (numeroLimpo === '') return '';
            const valorFormatado = new Intl.NumberFormat('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(parseInt(numeroLimpo) / 100);
            return valorFormatado;
        };

        const formatarTelefone = (valor) => {
            if (!valor) return '';
            let v = valor.replace(/\D/g, ''); 
            if (v.length > 11) v = v.substring(0, 11); 
            if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
            return v;
        };

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            const [darkMode, setDarkMode] = useState(false);
            
            // Controles de O.S. e Buscas
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            
            const [buscaCliente, setBuscaCliente] = useState('');
            const [clienteDropdownAberto, setClienteDropdownAberto] = useState(false);
            
            const [buscaProduto, setBuscaProduto] = useState('');
            const [produtoDropdownAberto, setProdutoDropdownAberto] = useState(false);

            const [novoPedido, setNovoPedido] = useState({
                cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando'
            });

            // Controles de Modais Secundários
            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ nome: '', texto_padrao: '', preco_base: '' });

            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => {
                carregarDados();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }); 

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: true });
                if (listaPedidos) setPedidos(listaPedidos);

                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);

                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            function fecharModalOS() {
                setModalAberto(false);
                setBuscaCliente('');
                setBuscaProduto('');
                setNovoPedido({ cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando' });
            }

            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                const pedidoFormatado = {
                    ...novoPedido,
                    valor_total: parseFloat(novoPedido.valor_total.replace(/\./g, '').replace(',', '.')) || 0
                };
                const { data, error } = await supabase.from('pedidos').insert([pedidoFormatado]).select();
                if (!error && data) {
                    setPedidos([...pedidos, data[0]]);
                    fecharModalOS();
                    setAbaAtual('producao');
                } else {
                    alert('Erro ao salvar OS: ' + error.message);
                }
                setSalvandoOS(false);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = {
                    ...novoProduto,
                    preco_base: parseFloat(novoProduto.preco_base.replace(/\./g, '').replace(',', '.')) || 0
                };
                const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                if (!error && data) {
                    setProdutos([...produtos, data[0]]);
                    setModalProdutoAberto(false);
                    setNovoProduto({ nome: '', texto_padrao: '', preco_base: '' });
                } else {
                    alert('Falha ao salvar produto: ' + error.message);
                }
                setSalvandoProduto(false);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const { data, error } = await supabase.from('clientes').insert([novoCliente]).select();
                if (!error && data) {
                    setClientes([...clientes, data[0]]);
                    setNovoPedido({...novoPedido, cliente: data[0].nome});
                    setBuscaCliente(data[0].nome);
                    setModalClienteAberto(false);
                    setNovoCliente({ nome: '', telefone: '', email: '', observacoes: '' });
                } else {
                    alert('Falha ao salvar cliente: ' + error.message);
                }
                setSalvandoCliente(false);
            }

            function imprimirOS(pedido) {
                setOsParaImprimir(pedido);
                setTimeout(() => window.print(), 100);
            }

            const clientesFiltrados = clientes.filter(c => 
                c.nome.toLowerCase().includes(buscaCliente.toLowerCase()) || 
                (c.telefone && c.telefone.includes(buscaCliente))
            );

            const produtosFiltrados = produtos.filter(p => 
                p.nome.toLowerCase().includes(buscaProduto.toLowerCase()) || 
                p.id.toString().includes(buscaProduto)
            );

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        <header className="sticky top-0 z-40 glass bg-white/80 dark:bg-darkBg/80 border-b border-gray-200 dark:border-darkBorder px-6 py-4 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-black text-xl tracking-tight">
                                    <i data-lucide="printer"></i> BERLIM
                                </div>
                                <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-gray-400 cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Produtos (Catálogo)</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i data-lucide={darkMode ? "sun" : "moon"} className="w-5 h-5"></i></button>
                                <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-md">AD</div>
                            </div>
                        </header>

                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-6 max-w-[1600px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <button onClick={() => setModalAberto(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md transition transform hover:-translate-y-0.5">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Nova O.S.
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center justify-between pb-2 border-b-2 border-orange-400">
                                            <h2 className="font-bold flex items-center gap-2 dark:text-gray-200"><i data-lucide="clock" className="w-4 h-4 text-orange-500"></i> Aguardando</h2>
                                        </div>
                                        {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center justify-between pb-2 border-b-2 border-blue-500">
                                            <h2 className="font-bold flex items-center gap-2 dark:text-gray-200"><i data-lucide="settings" className="w-4 h-4 text-blue-500"></i> Produzir</h2>
                                        </div>
                                        {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                    </div>
                                    <div className="flex flex-col gap
