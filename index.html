<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Produção</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 
                darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' 
            }}}
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; }
        .glass { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Conexão Direta com o Supabase
        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        function App() {
            const [pedidos, setPedidos] = useState([]);
            const [darkMode, setDarkMode] = useState(false);

            // Alterna entre o Modo Claro e Escuro
            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            // Busca os dados no Banco
            useEffect(() => {
                async function carregar() {
                    const { data } = await supabase.from('pedidos').select('*').order('id', { ascending: true });
                    if (data) setPedidos(data);
                }
                carregar();
                
                // Ativa os ícones modernos
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Menu Superior Minimalista */}
                    <header className="sticky top-0 z-50 glass bg-white/80 dark:bg-darkBg/80 border-b border-gray-200 dark:border-darkBorder px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-black text-xl tracking-tight">
                                <i data-lucide="printer"></i>
                                BERLIM
                            </div>
                            <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-gray-400">
                                <a href="#" className="text-slate-900 dark:text-white border-b-2 border-blue-600 pb-1">Produção</a>
                                <a href="#" className="hover:text-slate-900 dark:hover:text-white transition">Clientes</a>
                                <a href="#" className="hover:text-slate-900 dark:hover:text-white transition">Configurações</a>
                            </nav>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                                {darkMode ? <i data-lucide="sun" className="w-5 h-5"></i> : <i data-lucide="moon" className="w-5 h-5"></i>}
                            </button>
                            <button className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                                <i data-lucide="bell" className="w-5 h-5"></i>
                            </button>
                            <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-md">
                                AD
                            </div>
                        </div>
                    </header>

                    {/* Área Principal - Quadro Kanban */}
                    <main className="flex-1 p-6 max-w-[1600px] mx-auto w-full">
                        <div className="flex justify-between items-center mb-8">
                            <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md transition transform hover:-translate-y-0.5">
                                <i data-lucide="plus" className="w-4 h-4"></i>
                                Nova O.S.
                            </button>
                            <div className="flex bg-white dark:bg-darkCard rounded-lg border border-gray-200 dark:border-darkBorder p-1 shadow-sm">
                                <button className="px-4 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-md text-sm font-semibold shadow-sm">Kanban</button>
                                <button className="px-4 py-1.5 text-gray-500 text-sm font-medium hover:text-slate-900 dark:hover:text-white transition">Lista</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                            {/* Coluna: Aguardando */}
                            <div className="flex flex-col gap-4">
                                <div className="flex items-center justify-between pb-2 border-b-2 border-orange-400">
                                    <h2 className="font-bold flex items-center gap-2 dark:text-gray-200">
                                        <i data-lucide="clock" className="w-4 h-4 text-orange-500"></i> Aguardando
                                    </h2>
                                    <span className="bg-gray-200 dark:bg-gray-800 text-xs px-2 py-1 rounded-full font-bold">
                                        {pedidos.filter(p => p.status === 'Aguardando').length}
                                    </span>
                                </div>
                                {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} />)}
                            </div>

                            {/* Coluna: Produzir */}
                            <div className="flex flex-col gap-4">
                                <div className="flex items-center justify-between pb-2 border-b-2 border-blue-500">
                                    <h2 className="font-bold flex items-center gap-2 dark:text-gray-200">
                                        <i data-lucide="settings" className="w-4 h-4 text-blue-500"></i> Produzir
                                    </h2>
                                    <span className="bg-gray-200 dark:bg-gray-800 text-xs px-2 py-1 rounded-full font-bold">
                                        {pedidos.filter(p => p.status === 'Produzir').length}
                                    </span>
                                </div>
                                {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} />)}
                            </div>

                            {/* Coluna: Acabamento */}
                            <div className="flex flex-col gap-4">
                                <div className="flex items-center justify-between pb-2 border-b-2 border-green-500">
                                    <h2 className="font-bold flex items-center gap-2 dark:text-gray-200">
                                        <i data-lucide="package-check" className="w-4 h-4 text-green-500"></i> Acabamento
                                    </h2>
                                    <span className="bg-gray-200 dark:bg-gray-800 text-xs px-2 py-1 rounded-full font-bold">0</span>
                                </div>
                                <div className="border-2 border-dashed border-gray-200 dark:border-darkBorder rounded-xl h-32 flex items-center justify-center text-gray-400 text-sm font-medium">
                                    Arraste para cá
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // Componente Visual do Cartão de Pedido
        function Cartao({ pedido }) {
            return (
                <div className="bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm border border-gray-200 dark:border-darkBorder hover:shadow-md transition cursor-pointer relative group">
                    <div className="flex justify-between items-start mb-1">
                        <h3 className="font-bold text-base">{pedido.cliente}</h3>
                        <span className="text-[10px] font-bold uppercase tracking-wider bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-md text-gray-600 dark:text-gray-300">
                            {pedido.local_producao}
                        </span>
                    </div>
                    <p className="text-gray-500 dark:text-gray-400 text-sm mb-4 line-clamp-2">{pedido.servico}</p>
                    
                    <div className="flex justify-between items-center mt-3 pt-3 border-t border-gray-100 dark:border-gray-700/50">
                        <div className="flex items-center gap-1.5 text-xs font-medium text-gray-500 dark:text-gray-400">
                            <i data-lucide="user" className="w-3.5 h-3.5"></i> {pedido.responsavel || 'Equipe'}
                        </div>
                        <span className="font-bold text-sm text-slate-700 dark:text-slate-200">
                            R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}
                        </span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
