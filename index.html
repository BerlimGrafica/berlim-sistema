<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          /* Laranja Oficial Berlim */
                        brandHover: '#d9641c',     
                        
                        /* Sistema de Elevação Escala Cinzas Vercel */
                        darkBg: '#000000',         /* Level 0: Fundo de Tela Geral */
                        darkCard: '#0A0A0A',       /* Level 1: Corpo das Janelas e Modais */
                        darkElevated: '#111111',   /* Level 2: Inputs, Cartões e Carrinho */
                        darkHover: '#1A1A1A',      /* Level 3: Estados de Seleção e Hovers */
                        darkBorder: '#333333',     /* Linhas Finas de Divisão */
                        darkInput: '#000000'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s ease; 
            font-family: 'Montserrat', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .glass { backdrop-filter: blur(12px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #555; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-[#EDEDED] min-h-screen selection:bg-brand selection:text-white tracking-tight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        // ==== ÍCONES NATIVOS BLINDADOS ====
        function Icon({ name, className = "w-4 h-4" }) {
            if (name === 'printer') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
            if (name === 'sun') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>;
            if (name === 'moon') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>;
            if (name === 'plus') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>;
            if (name === 'x') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>;
            if (name === 'chevron-down') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"></path></svg>;
            if (name === 'trash-2') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>;
            if (name === 'lock') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
            return null;
        }

        const formatarMoeda = (valor) => {
            if (!valor) return '';
            const numeroLimpo = valor.toString().replace(/\D/g, ''); 
            if (numeroLimpo === '') return '';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseInt(numeroLimpo) / 100);
        };

        const formatarTelefone = (valor) => {
            if (!valor) return '';
            let v = valor.replace(/\D/g, ''); 
            if (v.length > 11) v = v.substring(0, 11); 
            if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
            return v;
        };

        const obterDataAtual = () => new Date().toISOString().split('T')[0];

        function desconstruirTextoServico(texto) {
            if (!texto) return { itens: [], observacoes: '' };
            let partes = texto.split('\n\n[OBSERVAÇÕES GERAIS]\n');
            let blocoItens = partes[0];
            let obs = partes[1] || '';
            
            if (!blocoItens.startsWith('• ') && partes.length === 1) {
                return { itens: [], observacoes: texto };
            }
            
            let itensTraduzidos = [];
            let blocosIndividuais = blocoItens.split('\n\n');
            
            for (let bloco of blocosIndividuais) {
                if (!bloco.startsWith('• ')) {
                    obs = obs ? obs + '\n' + bloco : bloco;
                    continue;
                }
                let linhas = bloco.split('\n');
                if (linhas.length < 3) {
                    obs = obs ? obs + '\n' + bloco : bloco;
                    continue;
                }
                
                let nome = linhas[0].replace('• ', '').trim();
                let descricao = linhas[1].replace(/^  /, '').trim();
                let AppValor = linhas[2].replace(/^  Valor: R\$ /, '').trim();
                
                let valor = AppValor;
                let desconto = '';
                
                let matchDesconto = AppValor.match(/\s\(-(\d+)%\)$/);
                if (matchDesconto) {
                    desconto = matchDesconto[1];
                    valor = AppValor.replace(matchDesconto[0], '').trim();
                }
                
                itensTraduzidos.push({ nome: nome, descricao: descricao, valor: valor, desconto: desconto, id_temp: Math.random() + Date.now() });
            }
            return { itens: itensTraduzidos, observacoes: obs };
        }

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            const [darkMode, setDarkMode] = useState(true); 
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            const [pedidoEmEdicao, setPedidoEmEdicao] = useState(null); 

            const [itensPedido, setItensPedido] = useState([]);
            const [itemAtual, setItemAtual] = useState({ nome: '', descricao: '', valor: '', desconto: '' });

            const [buscaCliente, setBuscaCliente] = useState('');
            const [clienteDropdownAberto, setClienteDropdownAberto] = useState(false);
            const [buscaProduto, setBuscaProduto] = useState('');
            const [produtoDropdownAberto, setProdutoDropdownAberto] = useState(false);

            const [novoPedido, setNovoPedido] = useState({ cliente: '', servico: '', valor_total: '', status: 'Aguardando', data_pedido: obterDataAtual() });
            
            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ id: null, nome: '', texto_padrao: '', preco_base: '' });

            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ id: null, nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => { carregarDados(); }, []);

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: false });
                if (listaPedidos) setPedidos(listaPedidos);
                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);
                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                if (darkMode) { document.documentElement.classList.remove('dark'); } 
                else { document.documentElement.classList.add('dark'); }
                setDarkMode(!darkMode);
            };

            function fecharModalOS() {
                setModalAberto(false);
                setPedidoEmEdicao(null);
                setBuscaCliente('');
                setBuscaProduto('');
                setItensPedido([]); 
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setNovoPedido({ cliente: '', servico: '', valor_total: '', status: 'Aguardando', data_pedido: obterDataAtual() });
            }

            function abrirEdicao(pedido) {
                const dadosDesconstruidos = desconstruirTextoServico(pedido.servico);
                setPedidoEmEdicao(pedido);
                setBuscaCliente(pedido.cliente);
                setItensPedido(dadosDesconstruidos.itens); 
                setNovoPedido({
                    cliente: pedido.cliente,
                    servico: dadosDesconstruidos.observacoes,
                    status: pedido.status,
                    valor_total: formatarMoeda((pedido.valor_total * 100).toFixed(0).toString()),
                    data_pedido: pedido.data_pedido || obterDataAtual()
                });
                setModalAberto(true);
            }

            const obterValorFinalItem = () => {
                const numOriginal = parseFloat(itemAtual.valor.replace(/\./g, '').replace(',', '.')) || 0;
                const pctDesconto = parseFloat(itemAtual.desconto) || 0;
                return numOriginal * (1 - pctDesconto / 100);
            };

            function adicionarItemAoCarrinho() {
                if (!itemAtual.descricao || !itemAtual.valor) return;
                const valorFinalCalculadoNum = obterValorFinalItem();
                const valorFinalCalculadoStr = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(valorFinalCalculadoNum);
                
                const novoItemEmpacotado = { 
                    ...itemAtual, 
                    valor_original: itemAtual.valor, 
                    valor: valorFinalCalculadoStr, 
                    id_temp: Math.random() + Date.now() 
                };

                const novosItens = [...itensPedido, novoItemEmpacotado];
                setItensPedido(novosItens); 
                
                let totalGeralOS = 0;
                novosItens.forEach(i => { totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0; });
                setNovoPedido({
                    ...novoPedido,
                    valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())
                });
                
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setBuscaProduto('');
            }

            function removerItemDoCarrinho(id_temp) {
                const novosItens = itensPedido.filter(i => i.id_temp !== id_temp);
                setItensPedido(novosItens);
                
                let totalGeralOS = 0;
                novosItens.forEach(i => { totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0; });
                setNovoPedido({
                    ...novoPedido,
                    valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())
                });
            }

            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                
                let textoFinalServico = '';
                if (itensPedido.length > 0) {
                    const itensTextoArray = itensPedido.map(i => {
                        const strDesconto = i.desconto ? ' (-' + i.desconto + '%)' : '';
                        const strNome = i.nome ? '• ' + i.nome : '• Serviço Personalizado';
                        return strNome + '\n  ' + i.descricao + '\n  Valor: R$ ' + i.valor + strDesconto;
                    });
                    const itensTextoString = itensTextoArray.join('\n\n');
                    const obsGerais = novoPedido.servico ? '\n\n[OBSERVAÇÕES GERAIS]\n' + novoPedido.servico : '';
                    textoFinalServico = itensTextoString + obsGerais;
                } else {
                    textoFinalServico = novoPedido.servico;
                }

                const valorNumericoFinal = parseFloat(novoPedido.valor_total.replace(/\./g, '').replace(',', '.')) || 0;

                if (pedidoEmEdicao) {
                    const { data, error } = await supabase.from('pedidos').update({
                        cliente: novoPedido.cliente,
                        servico: textoFinalServico,
                        status: novoPedido.status,
                        valor_total: valorNumericoFinal,
                        data_pedido: novoPedido.data_pedido
                    }).eq('id', pedidoEmEdicao.id).select();

                    if (!error && data) {
                        setPedidos(pedidos.map(p => p.id === data[0].id ? data[0] : p));
                        fecharModalOS();
                    } else alert('Erro ao atualizar OS: ' + error.message);
                } else {
                    const { data, error } = await supabase.from('pedidos').insert([{
                        cliente: novoPedido.cliente,
                        servico: textoFinalServico,
                        status: novoPedido.status,
                        valor_total: valorNumericoFinal,
                        data_pedido: novoPedido.data_pedido
                    }]).select();

                    if (!error && data) {
                        setPedidos([data[0], ...pedidos]);
                        fecharModalOS();
                    } else alert('Erro ao salvar OS: ' + error.message);
                }
                setSalvandoOS(false);
            }

            function abrirEdicaoProduto(prod) {
                setNovoProduto({ id: prod.id, nome: prod.nome, texto_padrao: prod.texto_padrao, preco_base: formatarMoeda((prod.preco_base * 100).toFixed(0).toString()) });
                setModalProdutoAberto(true);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = { nome: novoProduto.nome, texto_padrao: novoProduto.texto_padrao, preco_base: parseFloat(novoProduto.preco_base.replace(/\./g, '').replace(',', '.')) || 0 };

                if (novoProduto.id) {
                    const { data, error } = await supabase.from('produtos').update(produtoFormatado).eq('id', novoProduto.id).select();
                    if (!error && data) { setProdutos(produtos.map(p => p.id === novoProduto.id ? data[0] : p)); setModalProdutoAberto(false); setNovoProduto({ id: null, nome: '', texto_padrao: '', preco_base: '' }); } 
                    else alert('Falha ao atualizar produto: ' + error.message);
                } else {
                    const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                    if (!error && data) { setProdutos([...produtos, data[0]]); setModalProdutoAberto(false); setNovoProduto({ id: null, nome: '', texto_padrao: '', preco_base: '' }); } 
                    else alert('Falha ao salvar produto: ' + error.message);
                }
                setSalvandoProduto(false);
            }

            function abrirEdicaoCliente(cli) {
                setNovoCliente({ id: cli.id, nome: cli.nome, telefone: cli.telefone, email: cli.email, observacoes: cli.observacoes });
                setModalClienteAberto(true);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const clienteFormatado = { nome: novoCliente.nome, telefone: novoCliente.telefone, email: novoCliente.email, observacoes: novoCliente.observacoes };

                if (novoCliente.id) {
                    const { data, error } = await supabase.from('clientes').update(clienteFormatado).eq('id', novoCliente.id).select();
                    if (!error && data) { setClientes(clientes.map(c => c.id === novoCliente.id ? data[0] : c)); setModalClienteAberto(false); setNovoCliente({ id: null, nome: '', telefone: '', email: '', observacoes: '' }); } 
                    else alert('Falha ao atualizar cliente: ' + error.message);
                } else {
                    const { data, error } = await supabase.from('clientes').insert([clienteFormatado]).select();
                    if (!error && data) { setClientes([...clientes, data[0]]); setNovoPedido({...novoPedido, cliente: data[0].nome}); setBuscaCliente(data[0].nome); setModalClienteAberto(false); setNovoCliente({ id: null, nome: '', telefone: '', email: '', observacoes: '' }); } 
                    else alert('Falha ao salvar cliente: ' + error.message);
                }
                setSalvandoCliente(false);
            }

            function imprimirOS(pedido) {
                setOsParaImprimir(pedido);
                setTimeout(() => window.print(), 100);
            }

            const clientesFiltrados = clientes.filter(c => c.nome.toLowerCase().includes(buscaCliente.toLowerCase()) || (c.telefone && c.telefone.includes(buscaCliente)));
            const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProduto.toLowerCase()) || p.id.toString().includes(buscaProduto));
            const isModalTrancado = (pedidoEmEdicao && pedidoEmEdicao.status === 'Finalizado' && !isAdmin) ? true : false;

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        
                        {/* ================= HEADER ================= */}
                        <header className="sticky top-0 z-40 bg-white dark:bg-darkBg border-b border-gray-200 dark:border-darkBorder px-6 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2 text-gray-900 dark:text-white font-bold text-lg tracking-tight">
                                    <div className="w-5 h-5 bg-brand text-white flex items-center justify-center rounded-sm">
                                        <Icon name="printer" className="w-3 h-3 text-white" />
                                    </div>
                                    BERLIM
                                </div>
                                <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-[#888888] cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('baixa')} className={`transition ${abaAtual === 'baixa' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Baixa de Notas</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Catálogo</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleDarkMode} className="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-darkHover transition text-gray-600 dark:text-[#888888]">
                                    <Icon name={darkMode ? "sun" : "moon"} className="w-4 h-4" />
                                </button>
                                <div onClick={() => setIsAdmin(!isAdmin)} className={`w-7 h-7 rounded-full text-white flex items-center justify-center font-bold text-xs cursor-pointer transition ${isAdmin ? 'bg-red-600 ring-2 ring-red-500/30' : 'bg-brand'}`} title={isAdmin ? "Modo Admin Ativo" : "Admin"}>AD</div>
                            </div>
                        </header>

                        {/* ================= KANBAN ================= */}
                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1800px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Produção</h1>
                                    <button onClick={() => { setPedidoEmEdicao(null); setModalAberto(true); }} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium flex items-center gap-2 hover:bg-gray-200 transition">Nova O.S.</button>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                                    <div className="flex flex-col bg-gray-50 dark:bg-darkCard rounded-xl border border-gray-200 dark:border-darkBorder overflow-hidden shadow-sm">
                                        <div className="p-4 border-b border-gray-200 dark:border-darkBorder border-t-2 border-t-orange-500 bg-white dark:bg-transparent flex justify-between items-center">
                                            <h2 className="font-bold text-sm tracking-wide text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-orange-500"></div> Aguardando</h2>
                                            <span className="text-xs font-bold text-gray-500 bg-gray-100 dark:bg-darkBg px-2 py-0.5 rounded border dark:border-darkBorder">{pedidos.filter(p => p.status === 'Aguardando').length}</span>
                                        </div>
                                        <div className="p-4 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col bg-gray-50 dark:bg-darkCard rounded-xl border border-gray-200 dark:border-darkBorder overflow-hidden shadow-sm">
                                        <div className="p-4 border-b border-gray-200 dark:border-darkBorder border-t-2 border-t-blue-500 bg-white dark:bg-transparent flex justify-between items-center">

                    )}

                    {/* ================= MODAIS AUXILIARES ================= */}
                    {modalProdutoAberto && (
                        <div onClick={() => setModalProdutoAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard"><h3 className="font-semibold text-lg dark:text-white tracking-tight">{novoProduto.id ? 'Editar Produto' : 'Novo Produto'}</h3><button type="button" onClick={() => setModalProdutoAberto(false)} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><Icon name="x" className="w-5 h-5" /></button></div>
                                <form onSubmit={salvarProduto} className="p-6 flex flex-col gap-4">
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Nome</label><input required type="text" value={novoProduto.nome} onChange={e => setNovoProduto({...novoProduto, nome: e.target.value})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" /></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Descrição Base</label><textarea required rows="2" value={novoProduto.texto_padrao} onChange={e => setNovoProduto({...novoProduto, texto_padrao: e.target.value})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition"></textarea></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Preço Base (R$)</label><input required type="text" value={novoProduto.preco_base} onChange={e => setNovoProduto({...novoProduto, preco_base: formatarMoeda(e.target.value)})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition font-medium" placeholder="0,00" /></div>
                                    <div className="mt-4 flex justify-end gap-3"><button type="button" onClick={() => setModalProdutoAberto(false)} className="px-4 py-2 rounded text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-100 dark:hover:bg-darkHover transition">Cancelar</button><button type="submit" disabled={salvandoProduto} className="px-5 py-2 rounded text-sm font-medium bg-white text-black hover:bg-gray-200 transition">Salvar</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                    {modalClienteAberto && (
                        <div onClick={() => setModalClienteAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard"><h3 className="font-semibold text-lg dark:text-white tracking-tight">{novoCliente.id ? 'Editar Cliente' : 'Novo Cliente'}</h3><button type="button" onClick={() => setModalClienteAberto(false)} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><Icon name="x" className="w-5 h-5" /></button></div>
                                <form onSubmit={salvarCliente} className="p-6 flex flex-col gap-4">
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Nome / Empresa *</label><input required type="text" value={novoCliente.nome} onChange={e => setNovoCliente({...novoCliente, nome: e.target.value})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" placeholder="Ex: Fibrion" /></div>
                                    <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">WhatsApp</label><input type="text" value={novoCliente.telefone} onChange={e => setNovoCliente({...novoCliente, telephone: formatarTelefone(e.target.value)})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" placeholder="(11) 90000-0000" /></div><div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">E-mail</label><input type="email" value={novoCliente.email} onChange={e => setNovoCliente({...novoCliente, email: e.target.value})} className="w-full bg-white dark:bg-darkElevated border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" placeholder="contato@..." /></div></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Observações</label><textarea rows="2" value={novoCliente.observacoes} onChange={e => setNovoCliente({...novoCliente, observacoes: e.target.value})} className="w-full bg-white dark:bg-darkElevated border border-gray-200 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED]"></textarea></div>
                                    <div className="mt-4 flex justify-end gap-3"><button type="button" onClick={() => setModalClienteAberto(false)} className="px-4 py-2 rounded text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-100 dark:hover:bg-darkHover transition">Cancelar</button><button type="submit" disabled={salvandoCliente} className="px-5 py-2 rounded text-sm font-medium bg-white text-black hover:bg-gray-200 transition">Salvar</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE IMPRESSÃO */}
                    <div className="hidden print-only bg-white text-black p-8 font-sans max-w-2xl mx-auto">
                        {osParaImprimir && (
                            <div className="border-2 border-black p-6 rounded">
                                <div className="flex justify-between items-center border-b-2 border-black pb-4 mb-4">
                                    <div><h1 className="text-2xl font-black uppercase">BERLIM GRÁFICA</h1><p className="text-sm font-bold mt-1">Ordem de Serviço Nº {osParaImprimir.id}</p></div>
                                    <div className="text-right text-sm"><p>Data: {new Date().toLocaleDateString('pt-BR')}</p><p className="font-bold mt-1 uppercase">Local: Berlim</p></div>
                                </div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Cliente</p><p className="text-xl font-bold">{osParaImprimir.cliente}</p></div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Descrição do Serviço</p><div className="border border-gray-300 p-4 rounded bg-gray-50 min-h-[100px] whitespace-pre-wrap text-sm leading-relaxed">{osParaImprimir.servico}</div></div>
                                <div className="flex justify-between items-end border-t-2 border-black pt-4 mt-8">
                                    <div className="text-right w-full"><p className="text-sm text-gray-600 uppercase mb-1">Valor Total</p><p className="text-2xl font-black">R$ {Number(osParaImprimir.valor_total).toFixed(2).replace('.', ',')}</p></div>
                                </div>
                                <div className="mt-12 pt-4 text-center border-t border-dashed border-gray-400 text-xs text-gray-500">Uso interno - Assinatura do cliente na retirada: _____________________________________</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Componente do Cartão (100% Estático e Protegido no Kanban)
        function Cartao({ pedido, onPrint }) {
            return (
                <div className="bg-white dark:bg-darkCard p-4 rounded border border-gray-200 dark:border-darkBorder flex flex-col gap-3 group shadow-sm select-none">
                    <div className="flex justify-between items-start">
                        <h3 className="font-semibold text-sm text-gray-900 dark:text-[#EDEDED] leading-tight">{pedido.cliente}</h3>
                        <button onClick={(e) => { e.stopPropagation(); onPrint(); }} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition opacity-0 group-hover:opacity-100" title="Imprimir O.S.">
                            <Icon name="printer" className="w-3.5 h-3.5" />
                        </button>
                    </div>
                    <p className="text-gray-500 dark:text-[#A1A1AA] text-xs line-clamp-3 leading-relaxed whitespace-pre-wrap">{pedido.servico}</p>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-100 dark:border-darkBorder">
                        <span className="text-[11px] font-medium text-gray-400 dark:text-[#555]">#{pedido.id}</span>
                        <span className="font-bold text-xs text-gray-800 dark:text-[#EDEDED]">R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
