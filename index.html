<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          
                        brandHover: '#d9641c',     
                        darkBg: '#0A0A0A',         
                        darkLane: '#111111',       
                        darkCard: '#1A1A1A',       
                        darkBorder: '#2A2A2A',     
                        darkInput: '#0F0F0F'       
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; font-family: 'Montserrat', sans-serif; }
        .glass { backdrop-filter: blur(16px); }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #444; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #666; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        const formatarMoeda = (valor) => {
            if (!valor) return '';
            const numeroLimpo = valor.toString().replace(/\D/g, ''); 
            if (numeroLimpo === '') return '';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseInt(numeroLimpo) / 100);
        };

        const formatarTelefone = (valor) => {
            if (!valor) return '';
            let v = valor.replace(/\D/g, ''); 
            if (v.length > 11) v = v.substring(0, 11); 
            if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
            return v;
        };

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            
            const [darkMode, setDarkMode] = useState(true); 
            const [isAdmin, setIsAdmin] = useState(false); // <--- O MODO DEUS
            
            // Estados O.S. (Nova)
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            
            // Estados O.S. (Edição / Baixa)
            const [modalEdicaoAberto, setModalEdicaoAberto] = useState(false);
            const [salvandoEdicao, setSalvandoEdicao] = useState(false);
            const [pedidoEmEdicao, setPedidoEmEdicao] = useState(null);
            
            const [buscaCliente, setBuscaCliente] = useState('');
            const [clienteDropdownAberto, setClienteDropdownAberto] = useState(false);
            const [buscaProduto, setBuscaProduto] = useState('');
            const [produtoDropdownAberto, setProdutoDropdownAberto] = useState(false);

            const [novoPedido, setNovoPedido] = useState({ cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando' });

            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ nome: '', texto_padrao: '', preco_base: '' });

            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => { carregarDados(); }, []);
            useEffect(() => { lucide.createIcons(); }); 

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: false }); // Lista do mais novo pro mais antigo
                if (listaPedidos) setPedidos(listaPedidos);
                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);
                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                if (darkMode) { document.documentElement.classList.remove('dark'); } 
                else { document.documentElement.classList.add('dark'); }
                setDarkMode(!darkMode);
            };

            function fecharModalOS() {
                setModalAberto(false);
                setBuscaCliente('');
                setBuscaProduto('');
                setNovoPedido({ cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando' });
            }

            // SALVAR NOVA O.S.
            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                const pedidoFormatado = { ...novoPedido, valor_total: parseFloat(novoPedido.valor_total.replace(/\./g, '').replace(',', '.')) || 0 };
                const { data, error } = await supabase.from('pedidos').insert([pedidoFormatado]).select();
                if (!error && data) {
                    setPedidos([data[0], ...pedidos]);
                    fecharModalOS();
                    setAbaAtual('producao');
                } else alert('Erro ao salvar OS: ' + error.message);
                setSalvandoOS(false);
            }

            // ABRIR EDIÇÃO
            function abrirEdicao(pedido) {
                setPedidoEmEdicao({
                    ...pedido,
                    valor_total_formatado: formatarMoeda((pedido.valor_total * 100).toFixed(0).toString())
                });
                setModalEdicaoAberto(true);
            }

            // ATUALIZAR O.S. (BAIXA DE NOTA)
            async function salvarEdicao(e) {
                e.preventDefault();
                setSalvandoEdicao(true);
                const valorNumerico = parseFloat(pedidoEmEdicao.valor_total_formatado.replace(/\./g, '').replace(',', '.')) || 0;
                
                const { data, error } = await supabase.from('pedidos').update({
                    cliente: pedidoEmEdicao.cliente,
                    servico: pedidoEmEdicao.servico,
                    status: pedidoEmEdicao.status,
                    valor_total: valorNumerico
                }).eq('id', pedidoEmEdicao.id).select();

                if (!error && data) {
                    setPedidos(pedidos.map(p => p.id === data[0].id ? data[0] : p));
                    setModalEdicaoAberto(false);
                    setPedidoEmEdicao(null);
                } else {
                    alert('Erro ao atualizar OS: ' + error.message);
                }
                setSalvandoEdicao(false);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = { ...novoProduto, preco_base: parseFloat(novoProduto.preco_base.replace(/\./g, '').replace(',', '.')) || 0 };
                const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                if (!error && data) {
                    setProdutos([...produtos, data[0]]);
                    setModalProdutoAberto(false);
                    setNovoProduto({ nome: '', texto_padrao: '', preco_base: '' });
                } else alert('Falha ao salvar produto: ' + error.message);
                setSalvandoProduto(false);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const { data, error } = await supabase.from('clientes').insert([novoCliente]).select();
                if (!error && data) {
                    setClientes([...clientes, data[0]]);
                    setNovoPedido({...novoPedido, cliente: data[0].nome});
                    setBuscaCliente(data[0].nome);
                    setModalClienteAberto(false);
                    setNovoCliente({ nome: '', telefone: '', email: '', observacoes: '' });
                } else alert('Falha ao salvar cliente: ' + error.message);
                setSalvandoCliente(false);
            }

            function imprimirOS(pedido) {
                setOsParaImprimir(pedido);
                setTimeout(() => window.print(), 100);
            }

            const clientesFiltrados = clientes.filter(c => c.nome.toLowerCase().includes(buscaCliente.toLowerCase()) || (c.telefone && c.telefone.includes(buscaCliente)));
            const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProduto.toLowerCase()) || p.id.toString().includes(buscaProduto));

            // A Mágica do Bloqueio: Verifica se está finalizado E se o usuário não é admin
            const isLocked = pedidoEmEdicao?.status === 'Finalizado' && !isAdmin;

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        
                        {/* ================= HEADER ================= */}
                        <header className="sticky top-0 z-40 glass bg-white/80 dark:bg-darkBg/80 border-b border-gray-200 dark:border-darkBorder px-8 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-10">
                                <div className="flex items-center gap-2 text-brand font-black text-xl tracking-tight">
                                    <i data-lucide="printer"></i> BERLIM
                                </div>
                                <nav className="hidden md:flex gap-8 font-medium text-sm text-gray-500 dark:text-gray-400 cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-brand dark:text-white font-bold' : 'hover:text-gray-900 dark:hover:text-gray-200'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('baixa')} className={`transition ${abaAtual === 'baixa' ? 'text-brand dark:text-white font-bold' : 'hover:text-gray-900 dark:hover:text-gray-200'}`}>Baixa de Notas</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-brand dark:text-white font-bold' : 'hover:text-gray-900 dark:hover:text-gray-200'}`}>Catálogo</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-brand dark:text-white font-bold' : 'hover:text-gray-900 dark:hover:text-gray-200'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-5">
                                <button onClick={toggleDarkMode} className="p-2 rounded hover:bg-gray-100 dark:hover:bg-darkCard transition text-gray-600 dark:text-gray-400"><i data-lucide={darkMode ? "sun" : "moon"} className="w-5 h-5"></i></button>
                                {/* O BOTÃO SECRETO DO MODO ADMIN */}
                                <div 
                                    onClick={() => setIsAdmin(!isAdmin)} 
                                    className={`w-8 h-8 rounded text-white flex items-center justify-center font-bold text-sm shadow-md cursor-pointer transition ${isAdmin ? 'bg-red-600 ring-2 ring-red-400 ring-offset-2 dark:ring-offset-darkBg' : 'bg-brand'}`} 
                                    title={isAdmin ? "Modo Admin: ATIVADO (Pode editar finalizados)" : "Clique para ativar Modo Admin"}
                                >
                                    AD
                                </div>
                            </div>
                        </header>

                        {/* ================= KANBAN ================= */}
                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-8 max-w-[1800px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white tracking-tight">Painel de Produção</h1>
                                    <button onClick={() => setModalAberto(true)} className="bg-brand hover:bg-brandHover text-white px-5 py-2.5 rounded font-semibold flex items-center gap-2 shadow-sm transition transform hover:-translate-y-0.5">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Nova O.S.
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                                    {/* As colunas do Kanban ignoram os pedidos "Finalizados" */}
                                    <div className="flex flex-col bg-gray-100 dark:bg-darkLane rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                        <div className="p-4 border-b border-gray-200 dark:border-darkBorder border-t-2 border-t-orange-500 bg-gray-50/50 dark:bg-darkBg/50 flex justify-between items-center">
                                            <h2 className="font-bold text-sm tracking-wide uppercase text-gray-700 dark:text-gray-300 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-orange-500"></div> Aguardando</h2>
                                            <span className="text-xs font-bold text-gray-500">{pedidos.filter(p => p.status === 'Aguardando').length}</span>
                                        </div>
                                        <div className="p-4 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col bg-gray-100 dark:bg-darkLane rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                        <div className="p-4 border-b border-gray-200 dark:border-darkBorder border-t-2 border-t-blue-500 bg-gray-50/50 dark:bg-darkBg/50 flex justify-between items-center">
                                            <h2 className="font-bold text-sm tracking-wide uppercase text-gray-700 dark:text-gray-300 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Em Produção</h2>
                                            <span className="text-xs font-bold text-gray-500">{pedidos.filter(p => p.status === 'Produzir').length}</span>
                                        </div>
                                        <div className="p-4 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col bg-gray-100 dark:bg-darkLane rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                        <div className="p-4 border-b border-gray-200 dark:border-darkBorder border-t-2 border-t-emerald-500 bg-gray-50/50 dark:bg-darkBg/50 flex justify-between items-center">
                                            <h2 className="font-bold text-sm tracking-wide uppercase text-gray-700 dark:text-gray-300 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> Acabamento</h2>
                                            <span className="text-xs font-bold text-gray-500">{pedidos.filter(p => p.status === 'Acabamento').length}</span>
                                        </div>
                                        <div className="p-4 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Acabamento').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                </div>
                            </main>
                        )}

                        {/* ================= BAIXA DE NOTAS (LISTA GERAL) ================= */}
                        {abaAtual === 'baixa' && (
                            <main className="flex-1 p-8 max-w-[1400px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white tracking-tight">Baixa de Notas / Histórico</h1>
                                    <button onClick={() => setModalAberto(true)} className="bg-brand hover:bg-brandHover text-white px-5 py-2.5 rounded font-semibold flex items-center gap-2 shadow-sm transition">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Nova O.S.
                                    </button>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs uppercase tracking-wider font-bold text-gray-500 dark:text-gray-400"><th className="p-4 w-20 border-r border-gray-200 dark:border-darkBorder">OS Nº</th><th className="p-4 w-1/4 border-r border-gray-200 dark:border-darkBorder">Cliente</th><th className="p-4 border-r border-gray-200 dark:border-darkBorder">Serviço</th><th className="p-4 border-r border-gray-200 dark:border-darkBorder">Status</th><th className="p-4 text-right">Valor Final</th></tr></thead>
                                        <tbody>
                                            {pedidos.map(p => {
                                                const finalizado = p.status === 'Finalizado';
                                                return (
                                                    <tr 
                                                        key={p.id} 
                                                        onClick={() => abrirEdicao(p)}
                                                        className={`border-b border-gray-100 dark:border-darkBorder transition cursor-pointer group 
                                                            ${finalizado ? 'opacity-50 hover:opacity-80 bg-gray-50 dark:bg-[#151515]' : 'hover:bg-gray-50 dark:hover:bg-darkLane hover:ring-1 ring-inset ring-brand/30'}`}
                                                    >
                                                        <td className="p-4 text-sm font-semibold text-gray-500 border-r border-gray-100 dark:border-darkBorder">#{p.id}</td>
                                                        <td className={`p-4 font-bold border-r border-gray-100 dark:border-darkBorder ${finalizado ? 'text-gray-600 dark:text-gray-400' : 'text-gray-900 dark:text-white'}`}>{p.cliente}</td>
                                                        <td className="p-4 text-sm text-gray-600 dark:text-gray-400 border-r border-gray-100 dark:border-darkBorder truncate max-w-xs">{p.servico}</td>
                                                        <td className="p-4 border-r border-gray-100 dark:border-darkBorder">
                                                            <span className={`px-2.5 py-1 text-xs font-bold rounded-full border 
                                                                ${p.status === 'Finalizado' ? 'bg-gray-200 text-gray-700 border-gray-300 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700' : 
                                                                  p.status === 'Acabamento' ? 'bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800/50' : 
                                                                  p.status === 'Produzir' ? 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800/50' : 
                                                                  'bg-orange-100 text-orange-800 border-orange-200 dark:bg-orange-900/30 dark:text-orange-400 dark:border-orange-800/50'}`}>
                                                                {p.status}
                                                            </span>
                                                        </td>
                                                        <td className={`p-4 font-bold text-right ${finalizado ? 'text-gray-600 dark:text-gray-400' : 'text-gray-800 dark:text-gray-200'}`}>R$ {Number(p.valor_total).toFixed(2).replace('.', ',')}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* ================= CATÁLOGO ================= */}
                        {abaAtual === 'produtos' && (
                            <main className="flex-1 p-8 max-w-[1400px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white tracking-tight">Catálogo de Produtos</h1>
                                    <button onClick={() => setModalProdutoAberto(true)} className="bg-brand hover:bg-brandHover text-white px-5 py-2.5 rounded font-semibold flex items-center gap-2 shadow-sm transition">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Novo Produto
                                    </button>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs uppercase tracking-wider font-bold text-gray-500 dark:text-gray-400"><th className="p-4 w-20 border-r border-gray-200 dark:border-darkBorder">ID</th><th className="p-4 w-1/4 border-r border-gray-200 dark:border-darkBorder">Nome do Produto</th><th className="p-4 border-r border-gray-200 dark:border-darkBorder">Descrição Base</th><th className="p-4 text-right">Preço Base</th></tr></thead>
                                        <tbody>
                                            {produtos.map(p => (
                                                <tr key={p.id} className="border-b border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-darkLane transition group"><td className="p-4 text-sm font-semibold text-gray-500 border-r border-gray-100 dark:border-darkBorder">#{p.id}</td><td className="p-4 font-semibold text-gray-900 dark:text-white border-r border-gray-100 dark:border-darkBorder">{p.nome}</td><td className="p-4 text-sm text-gray-600 dark:text-gray-400 border-r border-gray-100 dark:border-darkBorder truncate max-w-xs">{p.texto_padrao}</td><td className="p-4 font-bold text-gray-800 dark:text-gray-200 text-right">R$ {Number(p.preco_base).toFixed(2).replace('.', ',')}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* ================= CLIENTES ================= */}
                        {abaAtual === 'clientes' && (
                            <main className="flex-1 p-8 max-w-[1400px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white tracking-tight">Banco de Clientes</h1>
                                    <button onClick={() => setModalClienteAberto(true)} className="bg-brand hover:bg-brandHover text-white px-5 py-2.5 rounded font-semibold flex items-center gap-2 shadow-sm transition">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Novo Cliente
                                    </button>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs uppercase tracking-wider font-bold text-gray-500 dark:text-gray-400"><th className="p-4 w-1/4 border-r border-gray-200 dark:border-darkBorder">Cliente / Empresa</th><th className="p-4 w-48 border-r border-gray-200 dark:border-darkBorder">WhatsApp</th><th className="p-4 w-1/4 border-r border-gray-200 dark:border-darkBorder">E-mail</th><th className="p-4">Observações</th></tr></thead>
                                        <tbody>
                                            {clientes.map(c => (
                                                <tr key={c.id} className="border-b border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-darkLane transition group"><td className="p-4 font-semibold text-gray-900 dark:text-white border-r border-gray-100 dark:border-darkBorder">{c.nome}</td><td className="p-4 text-sm text-gray-600 dark:text-gray-300 border-r border-gray-100 dark:border-darkBorder">{c.telefone || '---'}</td><td className="p-4 text-sm text-gray-600 dark:text-gray-300 border-r border-gray-100 dark:border-darkBorder">{c.email || '---'}</td><td className="p-4 text-sm text-gray-500 dark:text-gray-500 truncate max-w-xs">{c.observacoes || '---'}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}
                    </div>

                    {/* ================= MODAL: NOVA O.S. ================= */}
                    {modalAberto && (
                        <div onClick={fecharModalOS} className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 dark:bg-black/70 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-lg rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkBg">
                                    <h3 className="font-bold text-lg dark:text-white tracking-tight">Criar Ordem de Serviço</h3>
                                    <button type="button" onClick={fecharModalOS} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarOS} className="p-6 flex flex-col gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Cliente / Empresa</label>
                                        <div className="flex gap-2">
                                            <div className="relative flex-1">
                                                <input required type="text" value={buscaCliente} 
                                                    onChange={e => { setBuscaCliente(e.target.value); setNovoPedido({...novoPedido, cliente: e.target.value}); setClienteDropdownAberto(true); }}
                                                    onFocus={() => setClienteDropdownAberto(true)} onBlur={() => setTimeout(() => setClienteDropdownAberto(false), 200)}
                                                    className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white shadow-sm" 
                                                    placeholder="Busque por nome ou telefone..." autoComplete="off" />
                                                <i data-lucide="chevron-down" className="absolute right-3 top-3 w-5 h-5 text-gray-400 pointer-events-none"></i>
                                                {clienteDropdownAberto && clientesFiltrados.length > 0 && (
                                                    <ul className="absolute z-[60] w-full mt-1 max-h-48 overflow-y-auto bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded shadow-xl custom-scrollbar">
                                                        {clientesFiltrados.map(c => (
                                                            <li key={c.id} onClick={() => { setBuscaCliente(c.nome); setNovoPedido({...novoPedido, cliente: c.nome}); setClienteDropdownAberto(false); }} className="px-4 py-3 hover:bg-gray-50 dark:hover:bg-darkLane cursor-pointer border-b border-gray-100 dark:border-darkBorder last:border-0 flex justify-between items-center transition">
                                                                <span className="font-semibold text-gray-800 dark:text-gray-200">{c.nome}</span><span className="text-xs text-gray-500 dark:text-gray-400">{c.telefone}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                )}
                                            </div>
                                            <button type="button" onClick={() => setModalClienteAberto(true)} className="px-4 py-2.5 bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded hover:bg-gray-50 dark:hover:bg-darkLane transition flex items-center justify-center shadow-sm group" title="Cadastrar Novo Cliente">
                                                <i data-lucide="user-plus" className="w-5 h-5 text-gray-500 dark:text-gray-400 group-hover:text-brand transition"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Produto Base (Catálogo)</label>
                                        <div className="flex gap-2">
                                            <div className="relative flex-1">
                                                <input type="text" value={buscaProduto}
                                                    onChange={e => { setBuscaProduto(e.target.value); setProdutoDropdownAberto(true); }}
                                                    onFocus={() => setProdutoDropdownAberto(true)} onBlur={() => setTimeout(() => setProdutoDropdownAberto(false), 200)}
                                                    className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white shadow-sm"
                                                    placeholder="Busque por código ou nome do produto..." autoComplete="off" />
                                                <i data-lucide="chevron-down" className="absolute right-3 top-3 w-5 h-5 text-gray-400 pointer-events-none"></i>
                                                {produtoDropdownAberto && produtosFiltrados.length > 0 && (
                                                    <ul className="absolute z-[60] w-full mt-1 max-h-48 overflow-y-auto bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded shadow-xl custom-scrollbar">
                                                        {produtosFiltrados.map(p => (
                                                            <li key={p.id} onClick={() => {
                                                                setBuscaProduto(`${p.nome}`); setNovoPedido({ ...novoPedido, servico: p.texto_padrao, valor_total: formatarMoeda((p.preco_base * 100).toFixed(0).toString()) }); setProdutoDropdownAberto(false);
                                                            }} className="px-4 py-3 hover:bg-gray-50 dark:hover:bg-darkLane cursor-pointer border-b border-gray-100 dark:border-darkBorder last:border-0 flex flex-col transition">
                                                                <div className="flex justify-between items-center"><span className="font-semibold text-gray-800 dark:text-gray-200">{p.nome}</span><span className="text-xs font-bold text-brand">R$ {Number(p.preco_base).toFixed(2).replace('.', ',')}</span></div>
                                                                <span className="text-xs text-gray-500 dark:text-gray-500 truncate mt-1">{p.texto_padrao}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                )}
                                            </div>
                                            <button type="button" onClick={() => setModalProdutoAberto(true)} className="px-4 py-2.5 bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded hover:bg-gray-50 dark:hover:bg-darkLane transition flex items-center justify-center shadow-sm group" title="Cadastrar Novo Produto">
                                                <i data-lucide="box" className="w-5 h-5 text-gray-500 dark:text-gray-400 group-hover:text-brand transition"></i>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div><label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Descrição Detalhada</label><textarea required rows="3" value={novoPedido.servico} onChange={e => setNovoPedido({...novoPedido, servico: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-3 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white text-sm shadow-sm" placeholder="Especificações adicionais da O.S..."></textarea></div>
                                    <div><label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Valor Final (R$)</label><input required type="text" value={novoPedido.valor_total} onChange={e => setNovoPedido({...novoPedido, valor_total: formatarMoeda(e.target.value)})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white font-bold shadow-sm" placeholder="0,00" /></div>
                                    <div className="mt-2 pt-6 border-t border-gray-100 dark:border-darkBorder flex justify-end gap-3"><button type="button" onClick={fecharModalOS} className="px-5 py-2.5 rounded font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-darkLane transition">Cancelar</button><button type="submit" disabled={salvandoOS} className="px-6 py-2.5 rounded font-semibold bg-brand hover:bg-brandHover text-white shadow-sm transition disabled:opacity-50 flex items-center gap-2">{salvandoOS ? 'Salvando...' : 'Salvar Pedido'}</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ================= MODAL DE EDIÇÃO E BAIXA DE NOTA ================= */}
                    {modalEdicaoAberto && pedidoEmEdicao && (
                        <div onClick={() => { if(!salvandoEdicao) { setModalEdicaoAberto(false); setPedidoEmEdicao(null); } }} className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/50 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-lg rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkBg">
                                    <div className="flex items-center gap-3">
                                        <h3 className="font-bold text-lg dark:text-white tracking-tight">Editar Pedido #{pedidoEmEdicao.id}</h3>
                                        {isLocked && <span className="flex items-center gap-1 text-xs font-bold bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 px-2 py-1 rounded-full"><i data-lucide="lock" className="w-3 h-3"></i> Trancado</span>}
                                    </div>
                                    <button type="button" onClick={() => { setModalEdicaoAberto(false); setPedidoEmEdicao(null); }} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarEdicao} className="p-6 flex flex-col gap-5">
                                    
                                    {isLocked && (
                                        <div className="p-3 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/50 rounded text-sm text-red-600 dark:text-red-400 mb-2">
                                            Este pedido já foi finalizado. Apenas administradores do sistema podem editá-lo para evitar alterações no caixa.
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Cliente / Empresa</label>
                                        <input required type="text" value={pedidoEmEdicao.cliente} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, cliente: e.target.value})} disabled={isLocked} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Descrição do Serviço</label>
                                        <textarea required rows="3" value={pedidoEmEdicao.servico} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, servico: e.target.value})} disabled={isLocked} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-3 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white text-sm shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"></textarea>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Valor Final (R$)</label>
                                            <input required type="text" value={pedidoEmEdicao.valor_total_formatado} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, valor_total_formatado: formatarMoeda(e.target.value)})} disabled={isLocked} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white font-bold shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Status / Baixa</label>
                                            <div className="relative">
                                                <select required value={pedidoEmEdicao.status} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, status: e.target.value})} disabled={isLocked} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition dark:text-white font-bold appearance-none disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer shadow-sm">
                                                    <option value="Aguardando">Aguardando</option>
                                                    <option value="Produzir">Em Produção</option>
                                                    <option value="Acabamento">Acabamento</option>
                                                    <option value="Finalizado">Finalizado / Baixa</option>
                                                </select>
                                                <i data-lucide="chevron-down" className="absolute right-3 top-3 w-5 h-5 text-gray-400 pointer-events-none"></i>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-2 pt-6 border-t border-gray-100 dark:border-darkBorder flex justify-end gap-3">
                                        <button type="button" onClick={() => { setModalEdicaoAberto(false); setPedidoEmEdicao(null); }} className="px-5 py-2.5 rounded font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-darkLane transition">Fechar</button>
                                        {!isLocked && (
                                            <button type="submit" disabled={salvandoEdicao} className="px-6 py-2.5 rounded font-semibold bg-brand hover:bg-brandHover text-white shadow-sm transition disabled:opacity-50 flex items-center gap-2">
                                                {salvandoEdicao ? 'Atualizando...' : 'Atualizar Pedido'}
                                            </button>
                                        )}
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAIS AUXILIARES OCULTADOS NESTE BLOCO (JÁ IMPLEMENTADOS ACIMA) */}
                    {modalProdutoAberto && (
                        <div onClick={() => setModalProdutoAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/70 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkBg">
                                    <h3 className="font-bold text-lg dark:text-white tracking-tight">Adicionar ao Catálogo</h3>
                                    <button type="button" onClick={() => setModalProdutoAberto(false)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarProduto} className="p-6 flex flex-col gap-5">
                                    <div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">Nome do Produto</label><input required type="text" value={novoProduto.nome} onChange={e => setNovoProduto({...novoProduto, nome: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition" /></div>
                                    <div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">Texto / Descrição Base</label><textarea required rows="2" value={novoProduto.texto_padrao} onChange={e => setNovoProduto({...novoProduto, texto_padrao: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition text-sm"></textarea></div>
                                    <div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">Preço Base (R$)</label><input required type="text" value={novoProduto.preco_base} onChange={e => setNovoProduto({...novoProduto, preco_base: formatarMoeda(e.target.value)})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition font-bold" placeholder="0,00" /></div>
                                    <div className="mt-2 pt-6 border-t border-gray-100 dark:border-darkBorder flex justify-end gap-3"><button type="button" onClick={() => setModalProdutoAberto(false)} className="px-5 py-2.5 font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-darkLane rounded transition">Cancelar</button><button type="submit" disabled={salvandoProduto} className="px-6 py-2.5 rounded font-semibold bg-brand hover:bg-brandHover text-white shadow-sm transition">Salvar Produto</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                    {modalClienteAberto && (
                        <div onClick={() => setModalClienteAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/70 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkBg">
                                    <h3 className="font-bold text-lg dark:text-white tracking-tight">Cadastrar Cliente</h3>
                                    <button type="button" onClick={() => setModalClienteAberto(false)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarCliente} className="p-6 flex flex-col gap-5">
                                    <div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">Nome / Empresa *</label><input required type="text" value={novoCliente.nome} onChange={e => setNovoCliente({...novoCliente, nome: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition" placeholder="Ex: Fibrion" /></div>
                                    <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">WhatsApp</label><input type="text" value={novoCliente.telefone} onChange={e => setNovoCliente({...novoCliente, telefone: formatarTelefone(e.target.value)})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition" placeholder="(11) 90000-0000" /></div><div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">E-mail</label><input type="email" value={novoCliente.email} onChange={e => setNovoCliente({...novoCliente, email: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition" placeholder="contato@..." /></div></div>
                                    <div><label className="block text-sm font-semibold mb-2 dark:text-gray-300">Observações</label><textarea rows="2" value={novoCliente.observacoes} onChange={e => setNovoCliente({...novoCliente, observacoes: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-4 py-2.5 text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand dark:text-white shadow-sm transition"></textarea></div>
                                    <div className="mt-2 pt-6 border-t border-gray-100 dark:border-darkBorder flex justify-end gap-3"><button type="button" onClick={() => setModalClienteAberto(false)} className="px-5 py-2.5 font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-darkLane transition rounded">Cancelar</button><button type="submit" disabled={salvandoCliente} className="px-6 py-2.5 rounded font-semibold bg-brand hover:bg-brandHover text-white shadow-sm transition">Salvar Cliente</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="hidden print-only bg-white text-black p-8 font-sans max-w-2xl mx-auto">
                        {osParaImprimir && (
                            <div className="border-2 border-black p-6 rounded">
                                <div className="flex justify-between items-center border-b-2 border-black pb-4 mb-4">
                                    <div><h1 className="text-2xl font-black uppercase">BERLIM GRÁFICA</h1><p className="text-sm font-bold mt-1">Ordem de Serviço Nº {osParaImprimir.id || '---'}</p></div>
                                    <div className="text-right text-sm"><p>Data: {new Date().toLocaleDateString('pt-BR')}</p><p className="font-bold mt-1 uppercase">Local: {osParaImprimir.local_producao}</p></div>
                                </div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Cliente</p><p className="text-xl font-bold">{osParaImprimir.cliente}</p></div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Descrição do Serviço</p><div className="border border-gray-300 p-4 rounded bg-gray-50 min-h-[100px] whitespace-pre-wrap text-lg">{osParaImprimir.servico}</div></div>
                                <div className="flex justify-between items-end border-t-2 border-black pt-4 mt-8">
                                    <div><p className="text-sm text-gray-600 uppercase mb-1">Responsável</p><p className="font-bold">{osParaImprimir.responsavel || '---'}</p></div>
                                    <div className="text-right"><p className="text-sm text-gray-600 uppercase mb-1">Valor Total</p><p className="text-2xl font-black">R$ {Number(osParaImprimir.valor_total).toFixed(2).replace('.', ',')}</p></div>
                                </div>
                                <div className="mt-12 pt-4 text-center border-t border-dashed border-gray-400 text-xs text-gray-500">Uso interno - Assinatura do cliente na retirada: _____________________________________</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Cartao({ pedido, onPrint, onClick }) {
            return (
                <div onClick={onClick} className="bg-white dark:bg-darkCard p-5 rounded shadow-sm border border-gray-200 dark:border-darkBorder hover:border-brand/50 hover:shadow-md transition relative group cursor-pointer">
                    <div className="flex justify-between items-start mb-2">
                        <h3 className="font-bold text-base text-gray-900 dark:text-white leading-tight">{pedido.cliente}</h3>
                        <div className="flex gap-2">
                            <button onClick={(e) => { e.stopPropagation(); onPrint(); }} className="text-gray-400 hover:text-brand transition" title="Imprimir O.S."><i data-lucide="printer" className="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <p className="text-gray-500 dark:text-gray-400 text-sm mb-4 line-clamp-2 leading-relaxed">{pedido.servico}</p>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-100 dark:border-darkBorder">
                        <div className="flex items-center gap-1.5 text-xs font-medium text-gray-500 dark:text-gray-500"><i data-lucide="hash" className="w-3 h-3"></i> {pedido.id}</div>
                        <span className="font-bold text-sm text-gray-800 dark:text-gray-200">R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
