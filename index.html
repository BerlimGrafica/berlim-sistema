<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <!-- Fonte Geométrica e Moderna: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          
                        brandHover: '#d9641c',     
                        
                        /* Sistema de Elevação Estilo Vercel */
                        darkBg: '#000000',         /* Level 0: Fundo Absoluto */
                        darkCard: '#0A0A0A',       /* Level 1: Modais e Painéis */
                        darkElevated: '#111111',   /* Level 2: Inputs, Cartões e Carrinho */
                        darkHover: '#1A1A1A',      /* Level 3: Estados de Hover */
                        darkBorder: '#333333',     /* Bordas Finas de 1px */
                        darkInput: '#000000'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s ease; 
            font-family: 'Montserrat', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .glass { backdrop-filter: blur(12px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #555; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-white dark:bg-darkBg text-gray-900 dark:text-[#EDEDED] min-h-screen selection:bg-brand selection:text-white tracking-tight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        // ==== FUNÇÕES DE MÁSCARA ====
        const formatarMoeda = (valor) => {
            if (!valor) return '';
            const numeroLimpo = valor.toString().replace(/\D/g, ''); 
            if (numeroLimpo === '') return '';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseInt(numeroLimpo) / 100);
        };

        const formatarTelefone = (valor) => {
            if (!valor) return '';
            let v = valor.replace(/\D/g, ''); 
            if (v.length > 11) v = v.substring(0, 11); 
            if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
            return v;
        };

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            const [darkMode, setDarkMode] = useState(true); 
            const [isAdmin, setIsAdmin] = useState(false);
            
            // Controle da Janela Única de O.S. (Novo ou Edição)
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            const [pedidoEmEdicao, setPedidoEmEdicao] = useState(null); 

            // Itens do Carrinho
            const [itensPedido, setItensPedido] = useState([]);
            const [itemAtual, setItemAtual] = useState({ nome: '', descricao: '', valor: '', desconto: '' });

            const [buscaCliente, setBuscaCliente] = useState('');
            const [clienteDropdownAberto, setClienteDropdownAberto] = useState(false);
            const [buscaProduto, setBuscaProduto] = useState('');
            const [produtoDropdownAberto, setProdutoDropdownAberto] = useState(false);

            const [novoPedido, setNovoPedido] = useState({ cliente: '', servico: '', valor_total: '', status: 'Aguardando' });
            
            // Modais de Cadastro / Edição
            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ id: null, nome: '', texto_padrao: '', preco_base: '' });

            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ id: null, nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => { carregarDados(); }, []);
            useEffect(() => { lucide.createIcons(); }); 

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: false });
                if (listaPedidos) setPedidos(listaPedidos);
                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);
                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                if (darkMode) { document.documentElement.classList.remove('dark'); } 
                else { document.documentElement.classList.add('dark'); }
                setDarkMode(!darkMode);
            };

            function fecharModalOS() {
                setModalAberto(false);
                setPedidoEmEdicao(null);
                setBuscaCliente('');
                setBuscaProduto('');
                setItensPedido([]); 
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setNovoPedido({ cliente: '', servico: '', valor_total: '', status: 'Aguardando' });
            }

            function abrirEdicao(pedido) {
                setPedidoEmEdicao(pedido);
                setBuscaCliente(pedido.cliente);
                setNovoPedido({
                    cliente: pedido.cliente,
                    servico: pedido.servico,
                    status: pedido.status,
                    valor_total: formatarMoeda((pedido.valor_total * 100).toFixed(0).toString())
                });
                setItensPedido([]); 
                setModalAberto(true);
            }

            const obterValorFinalItem = () => {
                const numOriginal = parseFloat(itemAtual.valor.replace(/\./g, '').replace(',', '.')) || 0;
                const pctDesconto = parseFloat(itemAtual.desconto) || 0;
                return numOriginal * (1 - pctDesconto / 100);
            };

            function adicionarItemAoCarrinho() {
                if (!itemAtual.descricao || !itemAtual.valor) return;
                const valorFinalCalculadoNum = obterValorFinalItem();
                const valorFinalCalculadoStr = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(valorFinalCalculadoNum);
                const novoItemEmpacotado = { ...itemAtual, valor_original: itemAtual.valor, valor: valorFinalCalculadoStr, id_temp: Date.now() };

                const novosItens = [...itensPedido, novoItemEmpacotado];
                setItensPedido(novosItens);
                
                let totalGeralOS = 0;
                novosItens.forEach(i => { totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0; });
                setNovoPedido({...novoPedido, valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())});
                
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setBuscaProduto('');
            }

            function removerItemDoCarrinho(id_temp) {
                const novosItens = itensPedido.filter(i => i.id_temp !== id_temp);
                setItensPedido(novosItens);
                let totalGeralOS = 0;
                novosItens.forEach(i => { totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0; });
                setNovoPedido({...novoPedido, valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())});
            }

            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                
                let textoFinalServico = novoPedido.servico;
                if (!pedidoEmEdicao && itensPedido.length > 0) {
                    const itensTexto = itensPedido.map(i => `• ${i.nome || 'Serviço Personalizado'}\n  ${i.descricao}\n  Valor: R$ ${i.valor}${i.desconto ? ` (-${i.desconto}%)` : ''}`).join('\n\n');
                    textoFinalServico = itensTexto + (novoPedido.servico ? `\n\n[OBSERVAÇÕES GERAIS]\n${novoPedido.servico}` : '');
                }

                const valorNumerico = parseFloat(novoPedido.valor_total.replace(/\./g, '').replace(',', '.')) || 0;

                if (pedidoEmEdicao) {
                    const { data, error } = await supabase.from('pedidos').update({
                        cliente: novoPedido.cliente,
                        servico: novoPedido.servico,
                        status: novoPedido.status,
                        valor_total: valorNumerico
                    }).eq('id', pedidoEmEdicao.id).select();

                    if (!error && data) {
                        setPedidos(pedidos.map(p => p.id === data[0].id ? data[0] : p));
                        fecharModalOS();
                    } else alert('Erro ao atualizar OS: ' + error.message);
                } else {
                    const pedidoFormatado = { cliente: novoPedido.cliente, servico: textoFinalServico, status: novoPedido.status, valor_total: valorNumerico };
                    const { data, error } = await supabase.from('pedidos').insert([pedidoFormatado]).select();
                    if (!error && data) {
                        setPedidos([data[0], ...pedidos]);
                        fecharModalOS();
                    } else alert('Erro ao salvar OS: ' + error.message);
                }
                setSalvandoOS(false);
            }

            // PRODUTOS
            function abrirEdicaoProduto(prod) {
                setNovoProduto({ id: prod.id, nome: prod.nome, texto_padrao: prod.texto_padrao, preco_base: formatarMoeda((prod.preco_base * 100).toFixed(0).toString()) });
                setModalProdutoAberto(true);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = { nome: novoProduto.nome, texto_padrao: novoProduto.texto_padrao, preco_base: parseFloat(novoProduto.preco_base.replace(/\./g, '').replace(',', '.')) || 0 };

                if (novoProduto.id) {
                    const { data, error } = await supabase.from('produtos').update(produtoFormatado).eq('id', novoProduto.id).select();
                    if (!error && data) { setProdutos(produtos.map(p => p.id === novoProduto.id ? data[0] : p)); setModalProdutoAberto(false); setNovoProduto({ id: null, nome: '', texto_padrao: '', preco_base: '' }); } 
                    else alert('Falha ao atualizar produto: ' + error.message);
                } else {
                    const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                    if (!error && data) { setProdutos([...produtos, data[0]]); setModalProdutoAberto(false); setNovoProduto({ id: null, nome: '', texto_padrao: '', preco_base: '' }); } 
                    else alert('Falha ao salvar produto: ' + error.message);
                }
                setSalvandoProduto(false);
            }

            // CLIENTES
            function abrirEdicaoCliente(cli) {
                setNovoCliente({ id: cli.id, nome: cli.nome, telefone: cli.telefone, email: cli.email, observacoes: cli.observacoes });
                setModalClienteAberto(true);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const clienteFormatado = { nome: novoCliente.nome, telefone: novoCliente.telefone, email: novoCliente.email, observacoes: novoCliente.observacoes };

                if (novoCliente.id) {
                    const { data, error } = await supabase.from('clientes').update(clienteFormatado).eq('id', novoCliente.id).select();
                    if (!error && data) { setClientes(clientes.map(c => c.id === novoCliente.id ? data[0] : c)); setModalClienteAberto(false); setNovoCliente({ id: null, nome: '', telefone: '', email: '', observacoes: '' }); } 
                    else alert('Falha ao atualizar cliente: ' + error.message);
                } else {
                    const { data, error } = await supabase.from('clientes').insert([clienteFormatado]).select();
                    if (!error && data) { setClientes([...clientes, data[0]]); setNovoPedido({...novoPedido, cliente: data[0].nome}); setBuscaCliente(data[0].nome); setModalClienteAberto(false); setNovoCliente({ id: null, nome: '', telefone: '', email: '', observacoes: '' }); } 
                    else alert('Falha ao salvar cliente: ' + error.message);
                }
                setSalvandoCliente(false);
            }

            const clientesFiltrados = clientes.filter(c => c.nome.toLowerCase().includes(buscaCliente.toLowerCase()) || (c.telefone && c.telefone.includes(buscaCliente)));
            const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProduto.toLowerCase()) || p.id.toString().includes(buscaProduto));
            const isLocked = pedidoEmEdicao?.status === 'Finalizado' && !isAdmin;

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        
                        {/* ================= HEADER ================= */}
                        <header className="sticky top-0 z-40 bg-white dark:bg-darkBg border-b border-gray-200 dark:border-darkBorder px-6 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2 text-gray-900 dark:text-white font-bold text-lg tracking-tight">
                                    <div className="w-5 h-5 bg-brand text-white flex items-center justify-center rounded-sm"><i data-lucide="printer" className="w-3 h-3"></i></div>
                                    BERLIM
                                </div>
                                <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-[#888888] cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('baixa')} className={`transition ${abaAtual === 'baixa' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Baixa de Notas</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Catálogo</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-gray-900 dark:text-white font-semibold' : 'hover:text-gray-900 dark:hover:text-white'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleDarkMode} className="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-darkHover transition text-gray-600 dark:text-[#888888]"><i data-lucide={darkMode ? "sun" : "moon"} className="w-4 h-4"></i></button>
                                <div onClick={() => setIsAdmin(!isAdmin)} className={`w-7 h-7 rounded-full text-white flex items-center justify-center font-bold text-xs cursor-pointer transition ${isAdmin ? 'bg-red-600 ring-2 ring-red-500/30' : 'bg-brand'}`} title={isAdmin ? "Modo Admin Ativo" : "Admin"}>AD</div>
                            </div>
                        </header>

                        {/* ================= KANBAN (CARTÕES TRAVADOS) ================= */}
                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1800px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Produção</h1>
                                    <button onClick={() => { setPedidoEmEdicao(null); setModalAberto(true); }} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium flex items-center gap-2 hover:bg-gray-200 transition">Nova O.S.</button>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-orange-500"></div> Aguardando</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkCard px-2 py-0.5 rounded border dark:border-darkBorder">{pedidos.filter(p => p.status === 'Aguardando').length}</span>
                                        </div>
                                        <div className="p-1 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Em Produção</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkCard px-2 py-0.5 rounded border dark:border-darkBorder">{pedidos.filter(p => p.status === 'Produzir').length}</span>
                                        </div>
                                        <div className="p-1 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> Acabamento</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkCard px-2 py-0.5 rounded border dark:border-darkBorder">{pedidos.filter(p => p.status === 'Acabamento').length}</span>
                                        </div>
                                        <div className="p-1 flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Acabamento').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                        </div>
                                    </div>
                                </div>
                            </main>
                        )}

                        {/* ================= BAIXA DE NOTAS (CENTRAL DE EDIÇÃO) ================= */}
                        {abaAtual === 'baixa' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1400px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Histórico de Notas</h1>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder text-xs text-gray-500 dark:text-[#888888]"><th className="px-6 py-4 font-medium">OS Nº</th><th className="px-6 py-4 font-medium">Cliente</th><th className="px-6 py-4 font-medium">Serviço</th><th className="px-6 py-4 font-medium">Status</th><th className="px-6 py-4 text-right font-medium">Valor Final</th></tr></thead>
                                        <tbody>
                                            {pedidos.map(p => {
                                                const finalizado = p.status === 'Finalizado';
                                                return (
                                                    <tr key={p.id} onClick={() => abrirEdicao(p)} className={`border-b border-gray-100 dark:border-darkBorder transition cursor-pointer ${finalizado ? 'opacity-40 dark:bg-black hover:opacity-80' : 'hover:bg-gray-50 dark:hover:bg-darkHover'}`}>
                                                        <td className="px-6 py-4 text-sm font-medium text-gray-500">#{p.id}</td>
                                                        <td className={`px-6 py-4 font-semibold text-sm ${finalizado ? 'text-gray-500' : 'text-gray-900 dark:text-[#EDEDED]'}`}>{p.cliente}</td>
                                                        <td className="px-6 py-4 text-sm text-gray-600 dark:text-[#A1A1AA] truncate max-w-xs">{p.servico}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2.5 py-1 text-[11px] font-medium rounded border 
                                                                ${finalizado ? 'bg-gray-100 text-gray-600 border-gray-200 dark:bg-darkElevated dark:text-gray-400 dark:border-darkBorder' : 
                                                                  p.status === 'Acabamento' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-900/50' : 
                                                                  p.status === 'Produzir' ? 'bg-blue-50 text-blue-700 border-blue-200 dark:bg-blue-950/30 dark:text-blue-400 dark:border-blue-900/50' : 
                                                                  'bg-orange-50 text-orange-700 border-orange-200 dark:bg-orange-950/30 dark:text-orange-400 dark:border-orange-900/50'}`}>
                                                                {p.status}
                                                            </span>
                                                        </td>
                                                        <td className={`px-6 py-4 font-bold text-sm text-right ${finalizado ? 'text-gray-500' : 'text-gray-900 dark:text-[#EDEDED]'}`}>R$ {Number(p.valor_total).toFixed(2).replace('.', ',')}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* ================= CATÁLOGO (EDITÁVEL) ================= */}
                        {abaAtual === 'produtos' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1200px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Catálogo</h1>
                                    <button onClick={() => { setNovoProduto({ id: null, nome: '', texto_padrao: '', preco_base: '' }); setModalProdutoAberto(true); }} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium hover:bg-gray-200 transition">Novo Produto</button>
                                </div>
                                <div className="bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder text-xs font-medium text-gray-500 dark:text-[#888888]"><th className="px-6 py-4">ID</th><th className="px-6 py-4">Nome do Produto</th><th className="px-6 py-4">Descrição Base</th><th className="px-6 py-4 text-right">Preço Base</th></tr></thead>
                                        <tbody>

                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Descrição do Serviço</p><div className="border border-gray-300 p-4 rounded bg-gray-50 min-h-[100px] whitespace-pre-wrap text-sm leading-relaxed">{osParaImprimir.servico}</div></div>
                                <div className="flex justify-between items-end border-t-2 border-black pt-4 mt-8">
                                    <div className="text-right w-full"><p className="text-sm text-gray-600 uppercase mb-1">Valor Total</p><p className="text-2xl font-black">R$ {Number(osParaImprimir.valor_total).toFixed(2).replace('.', ',')}</p></div>
                                </div>
                                <div className="mt-12 pt-4 text-center border-t border-dashed border-gray-400 text-xs text-gray-500">Uso interno - Assinatura do cliente na retirada: _____________________________________</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Cartao({ pedido, onPrint }) {
            return (
                <div className="bg-white dark:bg-darkCard p-4 rounded border border-gray-200 dark:border-darkBorder flex flex-col gap-3 group shadow-sm select-none">
                    <div className="flex justify-between items-start">
                        <h3 className="font-semibold text-sm text-gray-900 dark:text-[#EDEDED] leading-tight">{pedido.cliente}</h3>
                        <button onClick={(e) => { e.stopPropagation(); onPrint(); }} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition opacity-0 group-hover:opacity-100" title="Imprimir O.S."><i data-lucide="printer" className="w-3.5 h-3.5"></i></button>
                    </div>
                    <p className="text-gray-500 dark:text-[#A1A1AA] text-xs line-clamp-3 leading-relaxed whitespace-pre-wrap">{pedido.servico}</p>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-100 dark:border-darkBorder">
                        <span className="text-[11px] font-medium text-gray-400 dark:text-[#555]">#{pedido.id}</span>
                        <span className="font-bold text-xs text-gray-800 dark:text-[#EDEDED]">R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
