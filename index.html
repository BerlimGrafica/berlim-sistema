<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 
                darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' 
            }}}
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; }
        .glass { backdrop-filter: blur(8px); }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        /* Customização para os campos de busca ficarem elegantes */
        input::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            const [darkMode, setDarkMode] = useState(false);
            
            // Controles de O.S.
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            const [produtoBusca, setProdutoBusca] = useState(''); // Estado para o campo de busca de produto
            const [novoPedido, setNovoPedido] = useState({
                cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando'
            });

            // Controles de Produtos
            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ nome: '', texto_padrao: '', preco_base: '' });

            // Controles de Clientes
            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => {
                carregarDados();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [pedidos, produtos, clientes, modalAberto, modalProdutoAberto, modalClienteAberto, darkMode, abaAtual]);

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: true });
                if (listaPedidos) setPedidos(listaPedidos);

                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);

                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
            };

            // ================= LÓGICA DE SALVAMENTO ================= //
            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                const pedidoFormatado = {
                    ...novoPedido,
                    valor_total: parseFloat(novoPedido.valor_total.replace(',', '.')) || 0
                };
                const { data, error } = await supabase.from('pedidos').insert([pedidoFormatado]).select();
                if (!error && data) {
                    setPedidos([...pedidos, data[0]]);
                    setModalAberto(false);
                    setNovoPedido({ cliente: '', servico: '', valor_total: '', local_producao: 'Berlim', responsavel: '', status: 'Aguardando' });
                    setProdutoBusca(''); // Limpa a busca do produto
                    setAbaAtual('producao');
                } else {
                    alert('Erro ao salvar OS: ' + error.message);
                }
                setSalvandoOS(false);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = {
                    ...novoProduto,
                    preco_base: parseFloat(novoProduto.preco_base.replace(',', '.')) || 0
                };
                const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                if (!error && data) {
                    setProdutos([...produtos, data[0]]);
                    setModalProdutoAberto(false);
                    setNovoProduto({ nome: '', texto_padrao: '', preco_base: '' });
                } else {
                    alert('Falha ao salvar produto: ' + error.message);
                }
                setSalvandoProduto(false);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const { data, error } = await supabase.from('clientes').insert([novoCliente]).select();
                if (!error && data) {
                    setClientes([...clientes, data[0]]);
                    setNovoPedido({...novoPedido, cliente: data[0].nome});
                    setModalClienteAberto(false);
                    setNovoCliente({ nome: '', telefone: '', email: '', observacoes: '' });
                } else {
                    alert('Falha ao salvar cliente: ' + error.message);
                }
                setSalvandoCliente(false);
            }

            function imprimirOS(pedido) {
                setOsParaImprimir(pedido);
                setTimeout(() => window.print(), 100);
            }

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        <header className="sticky top-0 z-40 glass bg-white/80 dark:bg-darkBg/80 border-b border-gray-200 dark:border-darkBorder px-6 py-4 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-black text-xl tracking-tight">
                                    <i data-lucide="printer"></i> BERLIM
                                </div>
                                <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-gray-400 cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Produtos (Catálogo)</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 pb-1 font-bold' : 'hover:text-slate-900 dark:hover:text-white'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleDarkMode} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i data-lucide={darkMode ? "sun" : "moon"} className="w-5 h-5"></i></button>
                                <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-md">AD</div>
                            </div>
                        </header>

                        {/* TELA: PRODUÇÃO (KANBAN) */}
                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-6 max-w-[1600px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <button onClick={() => setModalAberto(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md transition transform hover:-translate-y-0.5">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Nova O.S.
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center justify-between pb-2 border-b-2 border-orange-400">
                                            <h2 className="font-bold flex items-center gap-2 dark:text-gray-200"><i data-lucide="clock" className="w-4 h-4 text-orange-500"></i> Aguardando</h2>
                                        </div>
                                        {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center justify-between pb-2 border-b-2 border-blue-500">
                                            <h2 className="font-bold flex items-center gap-2 dark:text-gray-200"><i data-lucide="settings" className="w-4 h-4 text-blue-500"></i> Produzir</h2>
                                        </div>
                                        {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <div className="flex items-center justify-between pb-2 border-b-2 border-green-500">
                                            <h2 className="font-bold flex items-center gap-2 dark:text-gray-200"><i data-lucide="package-check" className="w-4 h-4 text-green-500"></i> Acabamento</h2>
                                        </div>
                                        {pedidos.filter(p => p.status === 'Acabamento').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} />)}
                                    </div>
                                </div>
                            </main>
                        )}

                        {/* TELA: PRODUTOS */}
                        {abaAtual === 'produtos' && (
                            <main className="flex-1 p-6 max-w-[1200px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white flex items-center gap-2"><i data-lucide="book-open" className="text-blue-500"></i> Catálogo de Produtos</h1>
                                    <button onClick={() => setModalProdutoAberto(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Novo Produto
                                    </button>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400"><th className="p-4">Nº</th><th className="p-4">Nome</th><th className="p-4">Descrição Base</th><th className="p-4 text-right">Preço Base</th></tr></thead>
                                        <tbody>
                                            {produtos.map(p => (
                                                <tr key={p.id} className="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50"><td className="p-4 font-bold text-blue-600">[{p.id}]</td><td className="p-4 font-semibold dark:text-white">{p.nome}</td><td className="p-4 text-sm text-gray-600 dark:text-gray-400">{p.texto_padrao}</td><td className="p-4 font-bold text-green-600 text-right">R$ {Number(p.preco_base).toFixed(2).replace('.', ',')}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* TELA: CLIENTES */}
                        {abaAtual === 'clientes' && (
                            <main className="flex-1 p-6 max-w-[1200px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-2xl font-bold dark:text-white flex items-center gap-2"><i data-lucide="users" className="text-blue-500"></i> Clientes</h1>
                                    <button onClick={() => setModalClienteAberto(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Novo Cliente
                                    </button>
                                </div>
                                <div className="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400"><th className="p-4">Nome</th><th className="p-4">Telefone</th><th className="p-4">E-mail</th><th className="p-4">Observações</th></tr></thead>
                                        <tbody>
                                            {clientes.map(c => (
                                                <tr key={c.id} className="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50"><td className="p-4 font-bold dark:text-white">{c.nome}</td><td className="p-4 dark:text-gray-300">{c.telefone || '---'}</td><td className="p-4 dark:text-gray-300">{c.email || '---'}</td><td className="p-4 text-sm text-gray-500 dark:text-gray-400">{c.observacoes || '---'}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}
                    </div>

                    {/* === MODAL: NOVA O.S. === */}
                    {modalAberto && (
                        /* O onClick no fundo fecha a janela. O onClick interno impede que o clique vaze pro fundo */
                        <div onClick={() => setModalAberto(false)} className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-blue-50 dark:bg-blue-900/20">
                                    <h3 className="font-bold text-lg dark:text-white text-blue-800 dark:text-blue-300">Cadastrar Nova O.S.</h3>
                                    <button type="button" onClick={() => setModalAberto(false)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarOS} className="p-6 flex flex-col gap-4">
                                    
                                    {/* CAMPO DE BUSCA INTELIGENTE DE CLIENTE */}
                                    <div>
                                        <label className="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300 flex justify-between items-end">
                                            <span>Cliente / Empresa</span>
                                            <button type="button" onClick={() => setModalClienteAberto(true)} className="text-xs text-indigo-600 dark:text-indigo-400 hover:underline font-bold flex items-center gap-1">
                                                <i data-lucide="plus-circle" className="w-3 h-3"></i> Adicionar Rápido
                                            </button>
                                        </label>
                                        {/* Agora é um Input com Datalist (Permite pesquisar por texto ou telefone!) */}
                                        <input 
                                            list="lista-clientes" 
                                            required 
                                            value={novoPedido.cliente} 
                                            onChange={e => setNovoPedido({...novoPedido, cliente: e.target.value})} 
                                            className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition dark:text-white" 
                                            placeholder="Digite nome ou telefone..." 
                                            autoComplete="off"
                                        />
                                        <datalist id="lista-clientes">
                                            {clientes.map(c => <option key={c.id} value={c.nome}>{c.telefone}</option>)}
                                        </datalist>
                                    </div>

                                    {/* CAMPO DE BUSCA INTELIGENTE DE PRODUTO */}
                                    <div className="p-3 bg-yellow-50 dark:bg-yellow-900/10 border border-yellow-200 dark:border-yellow-700/30 rounded-lg">
                                        <label className="block text-sm font-bold mb-1 text-yellow-800 dark:text-yellow-500 flex justify-between items-end">
                                            <span>1. Puxar Base do Catálogo</span>
                                            <button type="button" onClick={() => setModalProdutoAberto(true)} className="text-xs text-emerald-600 dark:text-emerald-500 hover:underline font-bold flex items-center gap-1">
                                                <i data-lucide="plus-circle" className="w-3 h-3"></i> Adicionar Rápido
                                            </button>
                                        </label>
                                        {/* Input pesquisável de Produtos */}
                                        <input 
                                            list="lista-produtos"
                                            value={produtoBusca}
                                            onChange={e => {
                                                setProdutoBusca(e.target.value);
                                                // Verifica se o texto digitado bate com algum produto
                                                const prod = produtos.find(p => `[${p.id}] ${p.nome}` === e.target.value);
                                                if (prod) {
                                                    setNovoPedido({
                                                        ...novoPedido,
                                                        servico: prod.texto_padrao,
                                                        valor_total: Number(prod.preco_base).toFixed(2).replace('.', ',')
                                                    });
                                                }
                                            }}
                                            className="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-yellow-500 transition dark:text-white text-sm shadow-sm"
                                            placeholder="Digite código ou nome do produto..."
                                            autoComplete="off"
                                        />
                                        <datalist id="lista-produtos">
                                            {produtos.map(p => <option key={p.id} value={`[${p.id}] ${p.nome}`}></option>)}
                                        </datalist>
                                    </div>
                                    
                                    {/* CAMPOS EDITÁVEIS FINAIS */}
                                    <div>
                                        <label className="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300 flex justify-between">
                                            <span>2. Descrição Final</span><span className="text-xs text-blue-500 font-normal flex items-center gap-1"><i data-lucide="edit-3" className="w-3 h-3"></i> (Pode editar)</span>
                                        </label>
                                        <textarea required rows="3" value={novoPedido.servico} onChange={e => setNovoPedido({...novoPedido, servico: e.target.value})} className="w-full bg-white dark:bg-gray-900 border border-blue-200 dark:border-blue-800/50 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition dark:text-white text-sm" placeholder="Adicione a quantidade, o tipo ou detalhes específicos..."></textarea>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300 flex justify-between">
                                                <span>Valor Final (R$)</span><span className="text-xs text-blue-500 font-normal">(Pode editar)</span>
                                            </label>
                                            <input required type="text" value={novoPedido.valor_total} onChange={e => setNovoPedido({...novoPedido, valor_total: e.target.value})} className="w-full bg-white dark:bg-gray-900 border border-blue-200 dark:border-blue-800/50 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition dark:text-white font-bold text-green-600 dark:text-green-400" placeholder="0,00" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Responsável</label>
                                            <input type="text" value={novoPedido.responsavel} onChange={e => setNovoPedido({...novoPedido, responsavel: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition dark:text-white" placeholder="Nome" />
                                        </div>
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800 flex justify-end gap-3">
                                        <button type="button" onClick={() => setModalAberto(false)} className="px-5 py-2 rounded-lg font-semibold text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition">Cancelar</button>
                                        <button type="submit" disabled={salvandoOS} className="px-5 py-2 rounded-lg font-semibold bg-blue-600 hover:bg-blue-700 text-white shadow-md transition disabled:opacity-50 flex items-center gap-2">
                                            {salvandoOS ? 'Salvando...' : <><i data-lucide="check" className="w-4 h-4"></i> Salvar Pedido</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* === MODAL: NOVO PRODUTO === */}
                    {modalProdutoAberto && (
                        <div onClick={() => setModalProdutoAberto(false)} className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-emerald-50 dark:bg-emerald-900/20">
                                    <h3 className="font-bold text-lg dark:text-white text-emerald-800 dark:text-emerald-300 flex items-center gap-2"><i data-lucide="box" className="w-5 h-5"></i> Adicionar ao Catálogo</h3>
                                    <button type="button" onClick={() => setModalProdutoAberto(false)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarProduto} className="p-6 flex flex-col gap-4">
                                    <div><label className="block text-sm font-semibold mb-1">Nome do Produto</label><input required type="text" value={novoProduto.nome} onChange={e => setNovoProduto({...novoProduto, nome: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2" /></div>
                                    <div><label className="block text-sm font-semibold mb-1">Texto / Descrição Base</label><textarea required rows="2" value={novoProduto.texto_padrao} onChange={e => setNovoProduto({...novoProduto, texto_padrao: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2"></textarea></div>
                                    <div><label className="block text-sm font-semibold mb-1">Preço Base (R$)</label><input required type="text" value={novoProduto.preco_base} onChange={e => setNovoProduto({...novoProduto, preco_base: e.target.value})} className="w-1/2 bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2" /></div>
                                    <div className="mt-4 pt-4 border-t flex justify-end gap-3"><button type="button" onClick={() => setModalProdutoAberto(false)} className="px-5 py-2 font-semibold text-gray-500">Cancelar</button><button type="submit" disabled={salvandoProduto} className="px-5 py-2 rounded-lg font-semibold bg-emerald-600 text-white">Salvar Produto</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* === MODAL: NOVO CLIENTE === */}
                    {modalClienteAberto && (
                        <div onClick={() => setModalClienteAberto(false)} className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-indigo-50 dark:bg-indigo-900/20">
                                    <h3 className="font-bold text-lg dark:text-white text-indigo-800 dark:text-indigo-300 flex items-center gap-2"><i data-lucide="user-plus" className="w-5 h-5"></i> Cadastrar Cliente</h3>
                                    <button type="button" onClick={() => setModalClienteAberto(false)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarCliente} className="p-6 flex flex-col gap-4">
                                    <div>
                                        <label className="block text-sm font-semibold mb-1">Nome / Empresa *</label>
                                        <input required type="text" value={novoCliente.nome} onChange={e => setNovoCliente({...novoCliente, nome: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 outline-none" placeholder="Ex: Fibrion" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-semibold mb-1">Telefone / WhatsApp</label><input type="text" value={novoCliente.telefone} onChange={e => setNovoCliente({...novoCliente, telefone: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2 text-sm" placeholder="(11) 90000-0000" /></div>
                                        <div><label className="block text-sm font-semibold mb-1">E-mail</label><input type="email" value={novoCliente.email} onChange={e => setNovoCliente({...novoCliente, email: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2 text-sm" placeholder="contato@..." /></div>
                                    </div>
                                    <div><label className="block text-sm font-semibold mb-1">Observações</label><textarea rows="2" value={novoCliente.observacoes} onChange={e => setNovoCliente({...novoCliente, observacoes: e.target.value})} className="w-full bg-gray-50 dark:bg-gray-800 border rounded-lg px-4 py-2 text-sm"></textarea></div>
                                    <div className="mt-2 pt-4 border-t flex justify-end gap-3"><button type="button" onClick={() => setModalClienteAberto(false)} className="px-5 py-2 font-semibold text-gray-500">Cancelar</button><button type="submit" disabled={salvandoCliente} className="px-5 py-2 rounded-lg font-semibold bg-indigo-600 text-white">Salvar Cliente</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE IMPRESSÃO */}
                    <div className="hidden print-only bg-white text-black p-8 font-sans max-w-2xl mx-auto">
                        {osParaImprimir && (
                            <div className="border-2 border-black p-6 rounded-xl">
                                <div className="flex justify-between items-center border-b-2 border-black pb-4 mb-4">
                                    <div><h1 className="text-2xl font-black uppercase">BERLIM GRÁFICA</h1><p className="text-sm font-bold mt-1">Ordem de Serviço Nº {osParaImprimir.id || '---'}</p></div>
                                    <div className="text-right text-sm"><p>Data: {new Date().toLocaleDateString('pt-BR')}</p><p className="font-bold mt-1 uppercase">Local: {osParaImprimir.local_producao}</p></div>
                                </div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Cliente</p><p className="text-xl font-bold">{osParaImprimir.cliente}</p></div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Descrição do Serviço</p><div className="border border-gray-300 p-4 rounded-lg bg-gray-50 min-h-[100px] whitespace-pre-wrap text-lg">{osParaImprimir.servico}</div></div>
                                <div className="flex justify-between items-end border-t-2 border-black pt-4 mt-8">
                                    <div><p className="text-sm text-gray-600 uppercase mb-1">Responsável</p><p className="font-bold">{osParaImprimir.responsavel || '---'}</p></div>
                                    <div className="text-right"><p className="text-sm text-gray-600 uppercase mb-1">Valor Total</p><p className="text-2xl font-black">R$ {Number(osParaImprimir.valor_total).toFixed(2).replace('.', ',')}</p></div>
                                </div>
                                <div className="mt-12 pt-4 text-center border-t border-dashed border-gray-400 text-xs text-gray-500">Uso interno - Assinatura do cliente na retirada: _____________________________________</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Cartao({ pedido, onPrint }) {
            return (
                <div className="bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm border border-gray-200 dark:border-darkBorder hover:shadow-md transition relative group">
                    <div className="flex justify-between items-start mb-1">
                        <h3 className="font-bold text-base">{pedido.cliente}</h3>
                        <div className="flex gap-2">
                            <button onClick={onPrint} className="text-gray-400 hover:text-blue-500 transition" title="Imprimir O.S."><i data-lucide="printer" className="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <p className="text-gray-500 dark:text-gray-400 text-sm mb-4 line-clamp-2">{pedido.servico}</p>
                    <div className="flex justify-between items-center mt-3 pt-3 border-t border-gray-100 dark:border-gray-700/50">
                        <div className="flex items-center gap-1.5 text-xs font-medium text-gray-500 dark:text-gray-400"><i data-lucide="user" className="w-3.5 h-3.5"></i> {pedido.responsavel || '---'}</div>
                        <span className="font-bold text-sm text-slate-700 dark:text-slate-200">R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
