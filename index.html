<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          
                        brandHover: '#d9641c',     
                        
                        /* Paleta Estilo Vercel */
                        darkBg: '#000000',         /* Fundo Preto Absoluto */
                        darkCard: '#111111',       /* Cinza de Elevação Vercel para Janelas e Modais */
                        darkLane: '#0A0A0A',       /* Fundo das esteiras */
                        darkBorder: '#333333',     /* Bordas de 1px finas */
                        darkInput: '#000000',      
                        darkHover: '#1A1A1A'       
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s ease; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .glass { backdrop-filter: blur(12px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #555; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-white dark:bg-darkBg text-gray-900 dark:text-[#EDEDED] min-h-screen selection:bg-brand selection:text-white tracking-tight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabase = supabase.createClient(
            'https://xbanoipgoleuahwbqksy.supabase.co',
            'sb_publishable_RSQ4odG0wxy8ZucJHu_WvQ_0JfM8jbh'
        );

        // ==== FUNÇÕES DE MÁSCARA (FORMATAÇÃO) ====
        const formatarMoeda = (valor) => {
            if (!valor) return '';
            const numeroLimpo = valor.toString().replace(/\D/g, ''); 
            if (numeroLimpo === '') return '';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseInt(numeroLimpo) / 100);
        };

        const formatarTelefone = (valor) => {
            if (!valor) return '';
            let v = valor.replace(/\D/g, ''); 
            if (v.length > 11) v = v.substring(0, 11); 
            if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
            return v;
        };

        function App() {
            const [abaAtual, setAbaAtual] = useState('producao');
            const [pedidos, setPedidos] = useState([]);
            const [produtos, setProdutos] = useState([]);
            const [clientes, setClientes] = useState([]);
            const [darkMode, setDarkMode] = useState(true); 
            const [isAdmin, setIsAdmin] = useState(false);
            
            // Estados do Modal Principal (O.S.)
            const [modalAberto, setModalAberto] = useState(false);
            const [salvandoOS, setSalvandoOS] = useState(false);
            const [osParaImprimir, setOsParaImprimir] = useState(null);
            
            // Estrutura do Carrinho de Itens (Incluindo controle de desconto)
            const [itensPedido, setItensPedido] = useState([]);
            const [itemAtual, setItemAtual] = useState({ nome: '', descricao: '', valor: '', desconto: '' });

            const [buscaCliente, setBuscaCliente] = useState('');
            const [clienteDropdownAberto, setClienteDropdownAberto] = useState(false);
            const [buscaProduto, setBuscaProduto] = useState('');
            const [produtoDropdownAberto, setProdutoDropdownAberto] = useState(false);

            const [novoPedido, setNovoPedido] = useState({ cliente: '', servico: '', valor_total: '', status: 'Aguardando' });
            
            // Edição / Baixa
            const [modalEdicaoAberto, setModalEdicaoAberto] = useState(false);
            const [salvandoEdicao, setSalvandoEdicao] = useState(false);
            const [pedidoEmEdicao, setPedidoEmEdicao] = useState(null);

            // Modais de Cadastro Rápido
            const [modalProdutoAberto, setModalProdutoAberto] = useState(false);
            const [salvandoProduto, setSalvandoProduto] = useState(false);
            const [novoProduto, setNovoProduto] = useState({ nome: '', texto_padrao: '', preco_base: '' });

            const [modalClienteAberto, setModalClienteAberto] = useState(false);
            const [salvandoCliente, setSalvandoCliente] = useState(false);
            const [novoCliente, setNovoCliente] = useState({ nome: '', telefone: '', email: '', observacoes: '' });

            useEffect(() => { carregarDados(); }, []);
            useEffect(() => { lucide.createIcons(); }); 

            async function carregarDados() {
                const { data: listaPedidos } = await supabase.from('pedidos').select('*').order('id', { ascending: false });
                if (listaPedidos) setPedidos(listaPedidos);
                const { data: listaProdutos } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (listaProdutos) setProdutos(listaProdutos);
                const { data: listaClientes } = await supabase.from('clientes').select('*').order('nome', { ascending: true });
                if (listaClientes) setClientes(listaClientes);
            }

            const toggleDarkMode = () => {
                if (darkMode) { document.documentElement.classList.remove('dark'); } 
                else { document.documentElement.classList.add('dark'); }
                setDarkMode(!darkMode);
            };

            function fecharModalOS() {
                setModalAberto(false);
                setBuscaCliente('');
                setBuscaProduto('');
                setItensPedido([]); 
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setNovoPedido({ cliente: '', servico: '', valor_total: '', status: 'Aguardando' });
            }

            // CÁLCULO DE DESCONTO INDIVIDUAL POR ITEM
            const obterValorFinalItem = () => {
                const numOriginal = parseFloat(itemAtual.valor.replace(/\./g, '').replace(',', '.')) || 0;
                const pctDesconto = parseFloat(itemAtual.desconto) || 0;
                return numOriginal * (1 - pctDesconto / 100);
            };

            function adicionarItemAoCarrinho() {
                if (!itemAtual.descricao || !itemAtual.valor) return;
                
                const valorFinalCalculadoNum = obterValorFinalItem();
                const valorFinalCalculadoStr = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(valorFinalCalculadoNum);
                
                const novoItemEmpacotado = { 
                    ...itemAtual, 
                    valor_original: itemAtual.valor,
                    valor: valorFinalCalculadoStr, // Carrinho armazena o preço final com desconto
                    id_temp: Date.now() 
                };

                const novosItens = [...itensPedido, novoItemEmpacotado];
                setItensPedido(novosItens);
                
                // Recalcula o somatório de todo o carrinho
                let totalGeralOS = 0;
                novosItens.forEach(i => {
                    totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0;
                });
                setNovoPedido({...novoPedido, valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())});
                
                // Reseta a esteira do item atual
                setItemAtual({ nome: '', descricao: '', valor: '', desconto: '' });
                setBuscaProduto('');
            }

            function removerItemDoCarrinho(id_temp) {
                const novosItens = itensPedido.filter(i => i.id_temp !== id_temp);
                setItensPedido(novosItens);
                
                let totalGeralOS = 0;
                novosItens.forEach(i => {
                    totalGeralOS += parseFloat(i.valor.replace(/\./g, '').replace(',', '.')) || 0;
                });
                setNovoPedido({...novoPedido, valor_total: formatarMoeda((totalGeralOS * 100).toFixed(0).toString())});
            }

            async function salvarOS(e) {
                e.preventDefault();
                setSalvandoOS(true);
                
                let textoFinalServico = '';
                if (itensPedido.length > 0) {
                    const itensTexto = itensPedido.map(i => `• ${i.nome || 'Serviço Personalizado'}\n  ${i.descricao}\n  Valor: R$ ${i.valor}${i.desconto ? ` (-${i.desconto}%)` : ''}`).join('\n\n');
                    textoFinalServico = itensTexto + (novoPedido.servico ? `\n\n[OBSERVAÇÕES GERAIS]\n${novoPedido.servico}` : '');
                } else {
                    textoFinalServico = novoPedido.servico;
                }

                const pedidoFormatado = { 
                    cliente: novoPedido.cliente, 
                    servico: textoFinalServico, 
                    status: novoPedido.status,
                    valor_total: parseFloat(novoPedido.valor_total.replace(/\./g, '').replace(',', '.')) || 0 
                };
                
                const { data, error } = await supabase.from('pedidos').insert([pedidoFormatado]).select();
                if (!error && data) {
                    setPedidos([data[0], ...pedidos]);
                    fecharModalOS();
                    setAbaAtual('producao');
                } else alert('Erro ao salvar OS: ' + error.message);
                setSalvandoOS(false);
            }

            function abrirEdicao(pedido) {
                setPedidoEmEdicao({
                    ...pedido,
                    valor_total_formatado: formatarMoeda((pedido.valor_total * 100).toFixed(0).toString())
                });
                setModalEdicaoAberto(true);
            }

            async function salvarEdicao(e) {
                e.preventDefault();
                setSalvandoEdicao(true);
                const valorNumerico = parseFloat(pedidoEmEdicao.valor_total_formatado.replace(/\./g, '').replace(',', '.')) || 0;
                
                const { data, error } = await supabase.from('pedidos').update({
                    cliente: pedidoEmEdicao.cliente,
                    servico: pedidoEmEdicao.servico,
                    status: pedidoEmEdicao.status,
                    valor_total: valorNumerico
                }).eq('id', pedidoEmEdicao.id).select();

                if (!error && data) {
                    setPedidos(pedidos.map(p => p.id === data[0].id ? data[0] : p));
                    setModalEdicaoAberto(false);
                    setPedidoEmEdicao(null);
                } else alert('Erro ao atualizar OS: ' + error.message);
                setSalvandoEdicao(false);
            }

            async function salvarProduto(e) {
                e.preventDefault();
                setSalvandoProduto(true);
                const produtoFormatado = { ...novoProduto, preco_base: parseFloat(novoProduto.preco_base.replace(/\./g, '').replace(',', '.')) || 0 };
                const { data, error } = await supabase.from('produtos').insert([produtoFormatado]).select();
                if (!error && data) { setProdutos([...produtos, data[0]]); setModalProdutoAberto(false); setNovoProduto({ nome: '', texto_padrao: '', preco_base: '' }); } 
                else alert('Falha ao salvar produto: ' + error.message);
                setSalvandoProduto(false);
            }

            async function salvarCliente(e) {
                e.preventDefault();
                setSalvandoCliente(true);
                const { data, error } = await supabase.from('clientes').insert([novoCliente]).select();
                if (!error && data) { setClientes([...clientes, data[0]]); setNovoPedido({...novoPedido, cliente: data[0].nome}); setBuscaCliente(data[0].nome); setModalClienteAberto(false); setNovoCliente({ nome: '', telefone: '', email: '', observacoes: '' }); } 
                else alert('Falha ao salvar cliente: ' + error.message);
                setSalvandoCliente(false);
            }

            function imprimirOS(pedido) {
                setOsParaImprimir(pedido);
                setTimeout(() => window.print(), 100);
            }

            const clientesFiltrados = clientes.filter(c => c.nome.toLowerCase().includes(buscaCliente.toLowerCase()) || (c.telefone && c.telefone.includes(buscaCliente)));
            const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProduto.toLowerCase()) || p.id.toString().includes(buscaProduto));
            const isLocked = pedidoEmEdicao?.status === 'Finalizado' && !isAdmin;

            return (
                <div>
                    <div className="flex flex-col min-h-screen no-print">
                        
                        {/* ================= HEADER VERCEL ================= */}
                        <header className="sticky top-0 z-40 bg-white dark:bg-darkBg border-b border-gray-200 dark:border-darkBorder px-6 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2 text-gray-900 dark:text-white font-bold text-lg tracking-tight">
                                    <div className="w-5 h-5 bg-brand text-white flex items-center justify-center rounded-sm">
                                        <i data-lucide="printer" className="w-3 h-3"></i>
                                    </div>
                                    BERLIM
                                </div>
                                <nav className="hidden md:flex gap-6 font-medium text-sm text-gray-500 dark:text-[#888888] cursor-pointer">
                                    <a onClick={() => setAbaAtual('producao')} className={`transition ${abaAtual === 'producao' ? 'text-gray-900 dark:text-white' : 'hover:text-gray-900 dark:hover:text-white'}`}>Produção</a>
                                    <a onClick={() => setAbaAtual('baixa')} className={`transition ${abaAtual === 'baixa' ? 'text-gray-900 dark:text-white' : 'hover:text-gray-900 dark:hover:text-white'}`}>Baixa de Notas</a>
                                    <a onClick={() => setAbaAtual('produtos')} className={`transition ${abaAtual === 'produtos' ? 'text-gray-900 dark:text-white' : 'hover:text-gray-900 dark:hover:text-white'}`}>Catálogo</a>
                                    <a onClick={() => setAbaAtual('clientes')} className={`transition ${abaAtual === 'clientes' ? 'text-gray-900 dark:text-white' : 'hover:text-gray-900 dark:hover:text-white'}`}>Clientes</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleDarkMode} className="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-darkHover transition text-gray-600 dark:text-[#888888]"><i data-lucide={darkMode ? "sun" : "moon"} className="w-4 h-4"></i></button>
                                <div onClick={() => setIsAdmin(!isAdmin)} className={`w-7 h-7 rounded-full text-white flex items-center justify-center font-bold text-xs cursor-pointer transition ${isAdmin ? 'bg-red-600 ring-2 ring-red-500/30' : 'bg-brand'}`} title={isAdmin ? "Modo Admin Ativo" : "Admin"}>AD</div>
                            </div>
                        </header>

                        {/* ================= KANBAN ================= */}
                        {abaAtual === 'producao' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1800px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Produção</h1>
                                    <button onClick={() => setModalAberto(true)} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-gray-200 transition">
                                        Nova O.S.
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-orange-500"></div> Aguardando</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkBorder px-2 py-0.5 rounded-full">{pedidos.filter(p => p.status === 'Aguardando').length}</span>
                                        </div>
                                        <div className="flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Aguardando').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Em Produção</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkBorder px-2 py-0.5 rounded-full">{pedidos.filter(p => p.status === 'Produzir').length}</span>
                                        </div>
                                        <div className="flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Produzir').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                    <div className="flex flex-col rounded-lg">
                                        <div className="pb-3 mb-2 flex justify-between items-center">
                                            <h2 className="font-medium text-sm text-gray-700 dark:text-[#EDEDED] flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> Acabamento</h2>
                                            <span className="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-darkBorder px-2 py-0.5 rounded-full">{pedidos.filter(p => p.status === 'Acabamento').length}</span>
                                        </div>
                                        <div className="flex flex-col gap-3 min-h-[200px]">
                                            {pedidos.filter(p => p.status === 'Acabamento').map(p => <Cartao key={p.id} pedido={p} onPrint={() => imprimirOS(p)} onClick={() => abrirEdicao(p)} />)}
                                        </div>
                                    </div>
                                </div>
                            </main>
                        )}

                        {/* ================= BAIXA ================= */}
                        {abaAtual === 'baixa' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1400px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Histórico de Notas</h1>
                                </div>
                                <div className="bg-white dark:bg-darkBg rounded-lg border border-gray-200 dark:border-darkBorder overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs text-gray-500 dark:text-[#888888]"><th className="px-6 py-4 font-medium">OS Nº</th><th className="px-6 py-4 font-medium">Cliente</th><th className="px-6 py-4 font-medium">Serviço</th><th className="px-6 py-4 font-medium">Status</th><th className="px-6 py-4 text-right font-medium">Valor Final</th></tr></thead>
                                        <tbody>
                                            {pedidos.map(p => {
                                                const finalizado = p.status === 'Finalizado';
                                                return (
                                                    <tr key={p.id} onClick={() => abrirEdicao(p)} className={`border-b border-gray-100 dark:border-darkBorder transition cursor-pointer ${finalizado ? 'opacity-50 dark:bg-black hover:opacity-80' : 'hover:bg-gray-50 dark:hover:bg-darkHover'}`}>
                                                        <td className="px-6 py-4 text-sm font-medium text-gray-500">#{p.id}</td>
                                                        <td className={`px-6 py-4 font-medium text-sm ${finalizado ? 'text-gray-500 dark:text-gray-500' : 'text-gray-900 dark:text-[#EDEDED]'}`}>{p.cliente}</td>
                                                        <td className="px-6 py-4 text-sm text-gray-600 dark:text-[#A1A1AA] truncate max-w-xs">{p.servico}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2.5 py-1 text-[11px] font-medium rounded-md border 
                                                                ${p.status === 'Finalizado' ? 'bg-gray-100 text-gray-600 border-gray-200 dark:bg-darkBorder dark:text-gray-300 dark:border-[#444]' : 
                                                                  p.status === 'Acabamento' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-900/50' : 
                                                                  p.status === 'Produzir' ? 'bg-blue-50 text-blue-700 border-blue-200 dark:bg-blue-950/30 dark:text-blue-400 dark:border-blue-900/50' : 
                                                                  'bg-orange-50 text-orange-700 border-orange-200 dark:bg-orange-950/30 dark:text-orange-400 dark:border-orange-900/50'}`}>
                                                                {p.status}
                                                            </span>
                                                        </td>
                                                        <td className={`px-6 py-4 font-medium text-sm text-right ${finalizado ? 'text-gray-500 dark:text-gray-500' : 'text-gray-900 dark:text-[#EDEDED]'}`}>R$ {Number(p.valor_total).toFixed(2).replace('.', ',')}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* ================= CATÁLOGO ================= */}
                        {abaAtual === 'produtos' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1200px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Catálogo</h1>
                                    <button onClick={() => setModalProdutoAberto(true)} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium hover:bg-gray-200 transition">Novo Produto</button>
                                </div>
                                <div className="bg-white dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-lg overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs font-medium text-gray-500 dark:text-[#888888]"><th className="px-6 py-4">ID</th><th className="px-6 py-4">Nome do Produto</th><th className="px-6 py-4">Descrição Base</th><th className="px-6 py-4 text-right">Preço Base</th></tr></thead>
                                        <tbody>
                                            {produtos.map(p => (
                                                <tr key={p.id} className="border-b border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-darkHover transition"><td className="px-6 py-4 text-sm font-medium text-gray-500">#{p.id}</td><td className="px-6 py-4 text-sm font-medium dark:text-[#EDEDED]">{p.nome}</td><td className="px-6 py-4 text-sm text-gray-600 dark:text-[#A1A1AA] truncate max-w-xs">{p.texto_padrao}</td><td className="px-6 py-4 text-sm font-medium dark:text-[#EDEDED] text-right">R$ {Number(p.preco_base).toFixed(2).replace('.', ',')}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        )}

                        {/* ================= CLIENTES ================= */}
                        {abaAtual === 'clientes' && (
                            <main className="flex-1 p-6 lg:p-10 max-w-[1200px] mx-auto w-full fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-semibold dark:text-white tracking-tight">Clientes</h1>
                                    <button onClick={() => setModalClienteAberto(true)} className="bg-white dark:bg-white text-black px-4 py-2 text-sm rounded-md font-medium hover:bg-gray-200 transition">Novo Cliente</button>

                                <div className="bg-white dark:bg-darkBg border border-gray-200 dark:border-darkBorder rounded-lg overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-gray-50 dark:bg-darkLane border-b border-gray-200 dark:border-darkBorder text-xs font-medium text-gray-500 dark:text-[#888888]"><th className="px-6 py-4">Cliente</th><th className="px-6 py-4">WhatsApp</th><th className="px-6 py-4">E-mail</th><th className="px-6 py-4">Observações</th></tr></thead>
                                        <tbody>
                                            {clientes.map(c => (
                                                <tr key={c.id} className="border-b border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-darkHover transition"><td className="px-6 py-4 text-sm font-medium dark:text-[#EDEDED]">{c.nome}</td><td className="px-6 py-4 text-sm text-gray-600 dark:text-[#A1A1AA]">{c.telefone || '---'}</td><td className="px-6 py-4 text-sm text-gray-600 dark:text-[#A1A1AA]">{c.email || '---'}</td><td className="px-6 py-4 text-sm text-gray-500 dark:text-gray-600 truncate max-w-xs">{c.observacoes || '---'}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>

                    </div>

                    {/* ================= MODAL PRINCIPAL: NOVA O.S. (CINZA VERCEL darkCard) ================= */}

                        <div onClick={fecharModalOS} className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-2xl rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default flex flex-col max-h-[90vh]">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard">

                                    <button type="button" onClick={fecharModalOS} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>

                                                <i data-lucide="plus" className="w-3 h-3"></i> Novo
                                            </button>
                                        </div>
                                        <div className="relative">
                                            <input required type="text" value={buscaCliente}

                                                className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:focus:border-brand transition dark:text-[#EDEDED]" 
                                                placeholder="Buscar cliente..." autoComplete="off" />

                                                    {clientesFiltrados.map(c => (
                                                        <li key={c.id} onClick={() => { setBuscaCliente(c.nome); setNovoPedido({...novoPedido, cliente: c.nome}); setClienteDropdownAberto(false); }} className="px-3 py-2.5 hover:bg-gray-50 dark:hover:bg-[#222] cursor-pointer border-b border-gray-100 dark:border-darkBorder last:border-0 flex justify-between items-center transition">
                                                            <span className="font-medium text-sm text-gray-800 dark:text-[#EDEDED]">{c.nome}</span><span className="text-xs text-gray-500">{c.telefone}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            )}
                                        </div>
                                    </div>

                                    {/* SEÇÃO 2: ITENS DO CARRINHO */}
                                    <div>
                                        <label className="block text-sm font-medium mb-3 text-gray-700 dark:text-[#EDEDED]">Itens da Ordem de Serviço</label>
                                        
                                        {/* Lista do Carrinho */}
                                        {itensPedido.length > 0 && (
                                            <div className="mb-4 flex flex-col gap-2">
                                                {itensPedido.map((item, index) => (
                                                    <div key={item.id_temp} className="flex justify-between items-center p-3 bg-gray-50 dark:bg-darkLane border border-gray-200 dark:border-darkBorder rounded">
                                                        <div className="flex flex-col">
                                                            <span className="font-semibold text-sm dark:text-white">{index + 1}. {item.nome || 'Serviço Personalizado'}</span>
                                                            <span className="text-xs text-gray-500 dark:text-[#A1A1AA] whitespace-pre-wrap mt-1">{item.descricao}</span>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <div className="text-right">
                                                                <span className="font-semibold text-sm dark:text-white">R$ {item.valor}</span>
                                                                {item.desconto && <span className="block text-[10px] text-brand font-medium">-{item.desconto}% desc.</span>}
                                                            </div>
                                                            <button type="button" onClick={() => removerItemDoCarrinho(item.id_temp)} className="text-gray-400 hover:text-red-500 transition"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Box para Adicionar Novo Item */}
                                        <div className="p-4 border border-dashed border-gray-300 dark:border-darkBorder rounded bg-gray-50/50 dark:bg-darkInput">

                                                <span className="text-xs font-semibold text-gray-500 dark:text-[#888888] uppercase tracking-wider">Configurar Item</span>
                                                <button type="button" onClick={() => setModalProdutoAberto(true)} className="text-xs font-medium text-brand hover:text-brandHover transition flex items-center gap-1">
                                                    <i data-lucide="plus" className="w-3 h-3"></i> Novo no Catálogo
                                                </button>
                                            </div>
                                            <div className="flex flex-col gap-3">
                                                <div className="relative">
                                                    <input type="text" value={buscaProduto}
                                                        onChange={e => { setBuscaProduto(e.target.value); setProdutoDropdownAberto(true); }}
                                                        onFocus={() => setProdutoDropdownAberto(true)} onBlur={() => setTimeout(() => setProdutoDropdownAberto(false), 200)}
                                                        className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:focus:border-brand transition dark:text-[#EDEDED]"
                                                        placeholder="Puxar base do catálogo (Opcional)..." autoComplete="off" />
                                                    {produtoDropdownAberto && produtosFiltrados.length > 0 && (
                                                        <ul className="absolute z-[60] w-full mt-1 max-h-48 overflow-y-auto bg-white dark:bg-[#111] border border-gray-200 dark:border-darkBorder rounded shadow-xl custom-scrollbar">
                                                            {produtosFiltrados.map(p => (
                                                                <li key={p.id} onClick={() => {
                                                                    setBuscaProduto(''); 
                                                                    setItemAtual({ nome: p.nome, descricao: p.texto_padrao, valor: formatarMoeda((p.preco_base * 100).toFixed(0).toString()), desconto: '' });
                                                                    setProdutoDropdownAberto(false);
                                                                }} className="px-3 py-2.5 hover:bg-gray-50 dark:hover:bg-[#222] cursor-pointer border-b border-gray-100 dark:border-darkBorder last:border-0 flex flex-col transition">
                                                                    <div className="flex justify-between items-center"><span className="font-medium text-sm dark:text-[#EDEDED]">{p.nome}</span><span className="text-xs font-medium text-brand">R$ {Number(p.preco_base).toFixed(2).replace('.', ',')}</span></div>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    )}
                                                </div>
                                                <textarea rows="2" value={itemAtual.descricao} onChange={e => setItemAtual({...itemAtual, descricao: e.target.value})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED]" placeholder="Descrição / Medidas / Detalhes do item..."></textarea>

                                                <div className="grid grid-cols-3 gap-3">
                                                    <div className="relative">
                                                        <span className="absolute left-3 top-2.5 text-xs text-gray-500">R$</span>
                                                        <input type="text" value={itemAtual.valor} onChange={e => setItemAtual({...itemAtual, valor: formatarMoeda(e.target.value)})} className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded pl-8 pr-3 py-2 text-xs outline-none focus:border-brand transition dark:text-[#EDEDED] font-medium" placeholder="Valor Bruto" />
                                                    </div>
                                                    <div>
                                                        <input type="text" value={itemAtual.desconto} 
                                                            onChange={e => {
                                                                let val = e.target.value.replace(/\D/g, '');
                                                                if (parseFloat(val) > 100) val = '100'; // Bloqueia descontos maiores que 100%
                                                                setItemAtual({...itemAtual, desconto: val});
                                                            }} 
                                                            className="w-full bg-white dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded px-3 py-2 text-xs outline-none focus:border-brand transition dark:text-[#EDEDED]" placeholder="Desconto %" />
                                                    </div>
                                                    <button type="button" onClick={adicionarItemAoCarrinho} disabled={!itemAtual.descricao || !itemAtual.valor} className="px-3 py-2 text-xs font-medium bg-white hover:bg-gray-200 text-black rounded transition disabled:opacity-50">
                                                        + Inserir Item
                                                    </button>
                                                </div>
                                                
                                                {/* FeedBack Visual do Abatimento */}
                                                {itemAtual.desconto && parseFloat(itemAtual.desconto) > 0 && (
                                                    <div className="text-[11px] text-gray-400 px-1">
                                                        Líquido Calculado: <span className="text-emerald-500 font-semibold">R$ {new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(obterValorFinalItem())}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* SEÇÃO 3: OBSERVAÇÕES GERAIS */}

                                        <label className="block text-sm font-medium mb-2 text-gray-700 dark:text-[#EDEDED]">Observações Gerais do Pedido</label>
                                        <textarea rows="2" value={novoPedido.servico} onChange={e => setNovoPedido({...novoPedido, servico: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED] mb-4" placeholder="Observações de entrega, prazos gerais da O.S..."></textarea>
                                        
                                        <div className="flex items-center justify-between p-4 bg-gray-50 dark:bg-darkLane border border-gray-200 dark:border-darkBorder rounded">
                                            <span className="font-semibold text-sm text-gray-700 dark:text-[#EDEDED]">Valor Total Geral</span>
                                            <div className="relative w-1/3">
                                                <span className="absolute left-3 top-2 font-bold dark:text-white">R$</span>
                                                <input required type="text" value={novoPedido.valor_total} onChange={e => setNovoPedido({...novoPedido, valor_total: formatarMoeda(e.target.value)})} className="w-full bg-transparent border-none text-right pl-10 pr-0 py-2 outline-none font-bold text-lg dark:text-white" placeholder="0,00" />
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                <div className="px-6 py-4 border-t border-gray-100 dark:border-darkBorder bg-gray-50 dark:bg-darkCard flex justify-end gap-3">
                                    <button type="button" onClick={fecharModalOS} className="px-4 py-2.5 rounded text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-200 dark:hover:bg-darkHover transition">Cancelar</button>
                                    <button type="button" onClick={salvarOS} disabled={salvandoOS || itensPedido.length === 0} className="px-6 py-2.5 rounded text-sm font-medium bg-brand hover:bg-brandHover text-white shadow-sm transition disabled:opacity-50 flex items-center gap-2">{salvandoOS ? 'Salvando...' : 'Finalizar Pedido'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================= MODAL: EDIÇÃO DE O.S. (CINZA VERCEL darkCard) ================= */}
                    {modalEdicaoAberto && pedidoEmEdicao && (
                        <div onClick={() => { if(!salvandoEdicao) { setModalEdicaoAberto(false); setPedidoEmEdicao(null); } }} className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/50 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-lg rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard">
                                    <div className="flex items-center gap-3">
                                        <h3 className="font-semibold text-xl dark:text-white tracking-tight">Editar O.S. #{pedidoEmEdicao.id}</h3>
                                        {isLocked && <span className="flex items-center gap-1 text-[11px] font-bold bg-gray-100 text-gray-600 dark:bg-darkBorder dark:text-gray-300 px-2 py-0.5 rounded-md"><i data-lucide="lock" className="w-3 h-3"></i> Finalizado</span>}
                                    </div>
                                    <button type="button" onClick={() => { setModalEdicaoAberto(false); setPedidoEmEdicao(null); }} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={salvarEdicao} className="p-6 flex flex-col gap-5">
                                    {isLocked && <div className="p-3 bg-red-950/20 border border-red-900/50 rounded text-xs text-red-400 mb-2">Nota fiscal liquidada. Ative o Modo Admin no avatar para forçar modificações.</div>}
                                    <div><label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-[#EDEDED]">Cliente / Empresa</label><input required type="text" value={pedidoEmEdicao.cliente} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, cliente: e.target.value})} disabled={isLocked} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED] disabled:opacity-50" /></div>
                                    <div><label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-[#EDEDED]">Serviços Solicitados (Livre)</label><textarea required rows="6" value={pedidoEmEdicao.servico} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, servico: e.target.value})} disabled={isLocked} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED] disabled:opacity-50 custom-scrollbar"></textarea></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-[#EDEDED]">Valor Final (R$)</label><input required type="text" value={pedidoEmEdicao.valor_total_formatado} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, valor_total_formatado: formatarMoeda(e.target.value)})} disabled={isLocked} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED] font-medium disabled:opacity-50" /></div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-[#EDEDED]">Status</label>
                                            <div className="relative">
                                                <select required value={pedidoEmEdicao.status} onChange={e => setPedidoEmEdicao({...pedidoEmEdicao, status: e.target.value})} disabled={isLocked} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand transition dark:text-[#EDEDED] appearance-none disabled:opacity-50 cursor-pointer">
                                                    <option value="Aguardando" className="dark:bg-darkBg">Aguardando</option><option value="Produzir" className="dark:bg-darkBg">Em Production</option><option value="Acabamento" className="dark:bg-darkBg">Acabamento</option><option value="Finalizado" className="dark:bg-darkBg">Finalizado / Baixa</option>
                                                </select>
                                                <i data-lucide="chevron-down" className="absolute right-3 top-2.5 w-4 h-4 text-gray-400 pointer-events-none"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-4 flex justify-end gap-3"><button type="button" onClick={() => { setModalEdicaoAberto(false); setPedidoEmEdicao(null); }} className="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-100 dark:hover:bg-darkHover transition">Fechar</button>{!isLocked && (<button type="submit" disabled={salvandoEdicao} className="px-5 py-2 rounded-md text-sm font-medium bg-white text-black hover:bg-gray-200 transition disabled:opacity-50">{salvandoEdicao ? 'Atualizando...' : 'Atualizar Pedido'}</button>)}</div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAIS AUXILIARES DE CADASTRO (CINZA VERCEL) */}
                    {modalProdutoAberto && (
                        <div onClick={() => setModalProdutoAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard"><h3 className="font-semibold text-lg dark:text-white tracking-tight">Novo Produto</h3><button type="button" onClick={() => setModalProdutoAberto(false)} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><i data-lucide="x" className="w-5 h-5"></i></button></div>
                                <form onSubmit={salvarProduto} className="p-6 flex flex-col gap-4">
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Nome</label><input required type="text" value={novoProduto.nome} onChange={e => setNovoProduto({...novoProduto, nome: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" /></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Descrição Base</label><textarea required rows="2" value={novoProduto.texto_padrao} onChange={e => setNovoProduto({...novoProduto, texto_padrao: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition"></textarea></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Preço Base (R$)</label><input required type="text" value={novoProduto.preco_base} onChange={e => setNovoProduto({...novoProduto, preco_base: formatarMoeda(e.target.value)})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition font-medium" placeholder="0,00" /></div>
                                    <div className="mt-4 flex justify-end gap-3"><button type="button" onClick={() => setModalProdutoAberto(false)} className="px-4 py-2 rounded text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-100 dark:hover:bg-darkHover transition">Cancelar</button><button type="submit" disabled={salvandoProduto} className="px-5 py-2 rounded text-sm font-medium bg-white text-black hover:bg-gray-200 transition">Salvar</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                    {modalClienteAberto && (
                        <div onClick={() => setModalClienteAberto(false)} className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/80 glass no-print transition-all cursor-pointer">
                            <div onClick={(e) => e.stopPropagation()} className="bg-white dark:bg-darkCard w-full max-w-md rounded shadow-2xl overflow-hidden border border-gray-200 dark:border-darkBorder cursor-default">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-darkBorder flex justify-between items-center bg-gray-50 dark:bg-darkCard"><h3 className="font-semibold text-lg dark:text-white tracking-tight">Novo Cliente</h3><button type="button" onClick={() => setModalClienteAberto(false)} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"><i data-lucide="x" className="w-5 h-5"></i></button></div>
                                <form onSubmit={salvarCliente} className="p-6 flex flex-col gap-4">
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Nome / Empresa *</label><input required type="text" value={novoCliente.nome} onChange={e => setNovoCliente({...novoCliente, nome: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" /></div>
                                    <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">WhatsApp</label><input type="text" value={novoCliente.telefone} onChange={e => setNovoCliente({...novoCliente, telefone: formatarTelefone(e.target.value)})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" placeholder="(11) 90000-0000" /></div><div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">E-mail</label><input type="email" value={novoCliente.email} onChange={e => setNovoCliente({...novoCliente, email: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition" placeholder="contato@..." /></div></div>
                                    <div><label className="block text-sm font-medium mb-1.5 dark:text-[#EDEDED]">Observações</label><textarea rows="2" value={novoCliente.observacoes} onChange={e => setNovoCliente({...novoCliente, observacoes: e.target.value})} className="w-full bg-transparent border border-gray-300 dark:border-darkBorder rounded px-3 py-2 text-sm outline-none focus:border-brand dark:text-white transition"></textarea></div>
                                    <div className="mt-4 flex justify-end gap-3"><button type="button" onClick={() => setModalClienteAberto(false)} className="px-4 py-2 rounded text-sm font-medium text-gray-600 dark:text-[#A1A1AA] hover:bg-gray-100 dark:hover:bg-darkHover transition">Cancelar</button><button type="submit" disabled={salvandoCliente} className="px-5 py-2 rounded text-sm font-medium bg-white text-black hover:bg-gray-200 transition">Salvar</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* VISTA DE IMPRESSÃO */}
                    <div className="hidden print-only bg-white text-black p-8 font-sans max-w-2xl mx-auto">
                        {osParaImprimir && (
                            <div className="border-2 border-black p-6 rounded">
                                <div className="flex justify-between items-center border-b-2 border-black pb-4 mb-4">
                                    <div><h1 className="text-2xl font-black uppercase">BERLIM GRÁFICA</h1><p className="text-sm font-bold mt-1">Ordem de Serviço Nº {osParaImprimir.id}</p></div>
                                    <div className="text-right text-sm"><p>Data: {new Date().toLocaleDateString('pt-BR')}</p><p className="font-bold mt-1 uppercase">Local: Berlim</p></div>
                                </div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Cliente</p><p className="text-xl font-bold">{osParaImprimir.cliente}</p></div>
                                <div className="mb-6"><p className="text-sm text-gray-600 uppercase mb-1">Descrição do Serviço</p><div className="border border-gray-300 p-4 rounded bg-gray-50 min-h-[100px] whitespace-pre-wrap text-sm leading-relaxed">{osParaImprimir.servico}</div></div>
                                <div className="flex justify-between items-end border-t-2 border-black pt-4 mt-8">
                                    <div className="text-right w-full"><p className="text-sm text-gray-600 uppercase mb-1">Valor Total</p><p className="text-2xl font-black">R$ {Number(osParaImprimir.valor_total).toFixed(2).replace('.', ',')}</p></div>
                                </div>
                                <div className="mt-12 pt-4 text-center border-t border-dashed border-gray-400 text-xs text-gray-500">Uso interno - Assinatura do cliente na retirada: _____________________________________</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Cartao({ pedido, onPrint, onClick }) {
            return (
                <div onClick={onClick} className="bg-white dark:bg-darkCard p-4 rounded border border-gray-200 dark:border-darkBorder hover:border-gray-400 dark:hover:border-[#555] transition cursor-pointer flex flex-col gap-3 group shadow-sm">
                    <div className="flex justify-between items-start">
                        <h3 className="font-semibold text-sm text-gray-900 dark:text-[#EDEDED] leading-tight">{pedido.cliente}</h3>
                        <button onClick={(e) => { e.stopPropagation(); onPrint(); }} className="text-gray-400 hover:text-gray-900 dark:hover:text-white transition opacity-0 group-hover:opacity-100" title="Imprimir O.S."><i data-lucide="printer" className="w-3.5 h-3.5"></i></button>
                    </div>
                    <p className="text-gray-500 dark:text-[#A1A1AA] text-xs line-clamp-3 leading-relaxed whitespace-pre-wrap">{pedido.servico}</p>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-100 dark:border-darkBorder">
                        <span className="text-[11px] font-medium text-gray-400 dark:text-[#555]">#{pedido.id}</span>
                        <span className="font-semibold text-xs text-gray-800 dark:text-[#EDEDED]">R$ {Number(pedido.valor_total).toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
